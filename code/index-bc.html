<style>
*{margin:0;padding:0;box-sizing:border-box}
html{touch-action:none} /* E-111: auch Root-Element, iOS-Randfälle (Overscroll) */
body{
  background:#0d0d2e;
  display:flex;align-items:center;justify-content:center;
  height:100dvh;overflow:hidden;
  touch-action:none;
  font-family:'Press Start 2P',monospace;
}
#wrap{position:relative;display:flex;flex-direction:column;align-items:center}
canvas{display:block;image-rendering:pixelated;touch-action:none}
#ctrl{
  display:none;
  position:absolute;bottom:0;left:0;right:0;
  height:124px;pointer-events:none;
}
.btn{
  position:absolute;
  border:3px solid #5a87bf;border-radius:8px;
  background:rgba(74,159,212,.18);color:#cfe0f5;
  font-family:'Press Start 2P',monospace;
  display:flex;align-items:center;justify-content:center;
  pointer-events:all;user-select:none;
  -webkit-tap-highlight-color:transparent;cursor:pointer;
  touch-action:none;
}
.btn:active{background:rgba(74,159,212,.42)}
/* v0.4.1 (E-048): Zwei-Daumen-Layout, alle Tasten >=44px, safe-area unten (CC#4) */
/* v0.11.25 (Sanft-Pass B1, E-138): ◀/▶ auseinandergezogen — bL an den linken Rand (10→6), bR nach rechts.
   Handy-Playtest 2026-07-11 (Holger): Lücke war zu groß → um 50% reduziert (bR 150→110), neutrale Lücke ~80px→~40px.
   Zonen überlappen weiterhin nicht (bL-Zone bis x84, bR-Zone ab x96). Startwert, per Handy justiert. */
#bL{bottom:calc(12px + env(safe-area-inset-bottom));left:6px;width:64px;height:64px;font-size:24px}
#bR{bottom:calc(12px + env(safe-area-inset-bottom));left:110px;width:64px;height:64px;font-size:24px}
#bU{bottom:calc(70px + env(safe-area-inset-bottom));right:104px;width:58px;height:52px;font-size:20px}
#bD{bottom:calc(12px + env(safe-area-inset-bottom));right:104px;width:58px;height:52px;font-size:20px}
/* v0.11.25 (Sanft-Pass B3, E-138): JUMP in die freie untere-rechte Ecke gewachsen (right 12→6, width 84→90, height 110→118, bottom 12→8) — linke Kante bleibt bei x=304 (kein zusätzlicher Überlapp mit dem Leiter-Cluster). */
#bJ{bottom:calc(8px + env(safe-area-inset-bottom));right:6px;width:90px;height:118px;font-size:9px;line-height:1.6}
/* v0.11 (E-090): Touch-Zonen deutlich groesser als die sichtbaren Buttons (Holger: breite Finger, trifft nicht immer) —
   unsichtbare Trefferflaeche +14px rundum; zu direkten Nachbarn hin begrenzt; JUMP gewinnt Ueberlapp (spaeter im DOM) */
/* v0.11.25 (Sanft-Pass B1, E-138): durch die neutrale Lücke (bL 6..70, bR 110..174, ~40px frei nach Handy-Justage)
   dürfen die Innenzonen wieder voll wachsen (war je -5px, weil bL/bR fast anlagen). bR rechts leicht geklemmt (-8),
   damit die Zone nicht in den Leiter-Cluster (bD/bU-Zone ab x=224) läuft. Kein Überlapp zwischen ◀ und ▶. */
.btn::after{content:'';position:absolute;inset:-14px}
#bL::after{right:-14px}
#bR::after{left:-14px;right:-8px}
#bU::after{bottom:-2px}
#bD::after{top:-2px}
</style>
</head>

// --- Game world ---
const GW = 400, GH = 560;

// Touch-Erkennung robust: iPadOS-Safari & manche Touch-Laptops melden kein 'ontouchstart'
const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

function resize() {
  // v0.4.4: Steuerung ueberlappt die tote Boden-Zone (~70px unter P0) → nur 54px reservieren, Handy-Feld groesser
  const reserve = isTouch ? 54 : 0;
  const ctrlH   = isTouch ? 124 : 0;
  const s = Math.min(window.innerWidth / GW, window.innerHeight / (GH + reserve));
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const r = s * dpr;
  cv.width  = Math.round(GW * r);
  cv.height = Math.round(GH * r);
  cx.setTransform(r, 0, 0, r, 0, 0); // Spiel-Koordinaten bleiben 400x560
  cx.imageSmoothingEnabled = false;
  cv.style.width  = (GW * s) + 'px';
  cv.style.height = (GH * s) + 'px';
  const wrap = document.getElementById('wrap');
  wrap.style.width  = (GW * s) + 'px';
  wrap.style.height = ((GH + reserve) * s) + 'px';
  ctrl.style.width  = GW + 'px';
  ctrl.style.height = ctrlH + 'px'; // volle Button-Hoehe, ragt nach oben in die Boden-Zone
  // v0.11.25 (Sanft-Pass B2, E-138): Steuer-Leiste-Skala nach unten clampen, damit die Primärtasten
  // (◀/▶ 64px → ≥52 CSS-px, 64*0.82≈52) auf schmalen Handys nicht zu klein werden. Weil die 400px-Leiste
  // dann breiter als der Canvas ist, wird sie auf die Feldmitte zentriert (left:50% + margin) und um die
  // Mitte skaliert (transformOrigin bottom center) — so ragt kein Button über den Rand (bei bottom-left
  // würde JUMP rechts ~3px abgeschnitten). Auf breiten Handys (cs==s) deckungsgleich mit der alten Ausrichtung.
  // Startwert; die Leiter-Tasten bU/bD (52px Basis) bleiben knapp darunter — voller Fix bräuchte px-Layout
  // (geparkt, Lena/Ravi-Review + echter Gerätetest). Delikat.
  const MIN_CTRL_S = 0.82;
  const cs = Math.max(s, MIN_CTRL_S);
  ctrl.style.left = '50%';
  ctrl.style.right = 'auto';
  ctrl.style.marginLeft = (-GW/2) + 'px'; // 400px-Leiste auf die Feldmitte zentrieren
  ctrl.style.transform = `scale(${cs})`;
  ctrl.style.transformOrigin = 'bottom center';
  // v0.11.25 (Holger): Sichtbarkeit der Touch-Steuerung wird NICHT hier gesetzt, sondern in loop() an den
  // Spielzustand gekoppelt (nur bei state==='play'). resize() läuft initial VOR der state-Definition (let, TDZ)
  // → hier kein state-Zugriff. Layout (Breite/Höhe/Transform oben) gilt weiter für Touch-Geräte.
}
window.addEventListener('resize', resize);
resize();

// --- Palette ---
const C = {
  bg:'#1a1a4e', bgd:'#0d0d2e', yel:'#f5c400', yeld:'#c97d00',
  blu:'#4a9fd4', blul:'#6bbde0', wht:'#ffffff', red:'#ff4444',
  purp:'#7c3aed', skin:'#f4a261', dbl:'#1e40af',
  grid:'rgba(74,159,212,0.06)',
};

// --- Barrel-Typen (E-018, E-019) ---
const BARREL_TYPES = {
  // v0.9 (E-073/M2): Vibe-Gewichte (mehr Typen-Mix) + Typ-Tempo spd (wertvoll = schneller, Risk/Reward)
  bug:         { pts:5,  color:'#cc2200', label:'BUG', weight:36, spd:1.0  },
  config:      { pts:10, color:'#7a8a9a', label:'CFG', weight:24, spd:1.08 },
  anforderung: { pts:20, color:'#4a9fd4', label:'ANF', weight:18, spd:1.18 },
  entwicklung: { pts:30, color:'#7c3aed', label:'DEV', weight:12, spd:1.32 },
  schulung:    { pts:50, color:'#f5c400', label:'SCH', weight:8,  spd:1.4  }, // v0.9.1 (E-074): 1,5→1,4 — Holger: "echt HART" (232→217 px/s in Akt 3)
};
// v0.11.2 (Holger): ausgeschriebene Typ-Namen — Fass-Schreibweise überall wie im Startschirm
const NAME_FULL={bug:'BUG',config:'CONFIG',anforderung:'ANFORDERUNG',entwicklung:'ENTWICKLUNG',schulung:'SCHULUNG'};
// Gewichteter Pool
const BARREL_POOL = [];
for (const [k, t] of Object.entries(BARREL_TYPES))
  for (let i = 0; i < t.weight; i++) BARREL_POOL.push(k);

// Akt-Typen: welche Barrel-Typen pro Akt aktiv (E-024)
const ACT_TYPES = [
  ['bug','config'],                                          // Akt 0: Sprint
  ['bug','config','anforderung','entwicklung'],              // Akt 1: Release
  ['bug','config','anforderung','entwicklung','schulung'],   // Akt 2: Go-Live
];
// v0.11.3 (CC-Review #7): ACT_NAMES gelöscht — seit E-097 ungenutzt, die Spielersprache trägt ACT_GOAL (PROTOTYP/BETA/LIVE)
const ACT_GOAL  = ['PROTOTYP','BETA','LIVE!']; // Ziel-Label oben, App-Lebenszyklus statt Code-Sprech (E-046)
const MAX_STAGE = 5; // App-Reward: Anzahl Bau-Stufen (app-stage-1..5)
// Neue Barrel-Typen pro Akt (was dazu kommt)
const ACT_NEW = [
  ['bug','config'],           // Akt 0: diese starten
  ['anforderung','entwicklung'], // Akt 1: diese kommen dazu
  ['schulung'],               // Akt 2: das kommt dazu
];
const ACT_DESC = [
  'Bug & Config Fässer kommen!',
  '+Anforderung & Entwicklung!',
  '+Schulung — alles auf einmal!',
];

// v0.9 (E-073/M2): Typen-Cap je App (KONZEPT §2 — App 1 nur BUG/CFG, App 2 +ANF, ab App 3 alles)
const APP_TYPES = [ ['bug','config'], ['bug','config','anforderung'], ['bug','config','anforderung','entwicklung'] ]; // v0.9.1 (E-074): DEV ab App 3, SCH erst ab App 4 — Speed-Kurve entzerrt
function appAllowedTypes(){ return appsShipped < APP_TYPES.length ? APP_TYPES[appsShipped] : null; }
function randomBarrelType(act) {
  const allowed = ACT_TYPES[act];
  const appCap = appAllowedTypes();
  let pool = BARREL_POOL.filter(t => allowed.includes(t) && (!appCap || appCap.includes(t)));
  // Schnell-Fass-Deckel (E-073, Holger): max. 1 Fass mit spd >= 1.3 gleichzeitig auf dem Schirm
  if(barrels.some(b => BARREL_TYPES[b.type].spd >= 1.3)){
    const slow = pool.filter(t => BARREL_TYPES[t].spd < 1.3);
    if(slow.length) pool = slow;
  }
  if(!pool.length) pool = ['bug'];
  return pool[Math.floor(Math.random() * pool.length)];
}

// --- Layout ---
const PLATS = [
  {x:0,   y:490, w:400, h:10, dir:-1},  // P0 Boden  (+20px hoch)
  {x:10,  y:400, w:372, h:10, dir: 1},  // P1
  {x:18,  y:310, w:372, h:10, dir:-1},  // P2
  {x:10,  y:220, w:372, h:10, dir: 1},  // P3
  {x:18,  y:130, w:372, h:10, dir:-1},  // P4 Ziel
];
const LW = 18;
const LADDERS = [
  // Leiter-Schalter — ALLE Leitern per Flag steuerbar (tunebar fuers Balancing: Flag setzen/entfernen, kein Neu-Bauen).
  //   save:true => H5-Savepoint: hier fahren nie Faesser runter (nur die H5-Abfahrt ist gegatet, Klettern bleibt unveraendert).
  //   win:true  => Sieg-Leiter-Schutz (§8.3): ebenfalls keine Abfahrt — semantisch getrennt vom Savepoint, damit klar bleibt was man kippt.
  // Beide Flags wirken gleich (keine Abfahrt), sind aber bewusst zwei Namen; win entfernen macht auch die Sieg-Leiter scharf.
  {x:346, yt:400, yb:490, save:true},  // L0 Boden<->P1 — SAVEPOINT (unterste Ebene bleibt ruhig)
  {x: 36, yt:310, yb:400},             // L1 P1<->P2 — H5-Abfahrten aktiv
  {x:346, yt:220, yb:310},             // L2 P2<->P3 — H5-Abfahrten aktiv
  {x: 36, yt:130, yb:220, win:true},   // L3 P3<->P4 — SIEG-LEITER (Win-Schutz; win:true entfernen => auch sie scharf)
];
const BSPAWN = {x:358, y:104}; // über P4 (y=130-28+2=104)

// --- H5 (KONZEPT §2 „Savepoint-Rampe"): Leiter-Abfahrten mit Schutz F-5b ---
// Ein Fass rollt am Leiterkopf mit App-gestaffelter Chance NICHT weiter, sondern die Leiter
// hinunter (eine Ebene tiefer). Struktur strikt analog Loch-Durchfall (H3b/gapFall) — eigener
// isolierter Fall-Zweig, gapAt-Skip (F-5c), Richtung+Tempo bleiben erhalten. F-5b (nicht
// verhandelbar): feuert nie unter dem Spieler auf derselben Leiter + Wackel-Telegraph 0,3 s.
const LADDER_TELE = 0.3;                 // Telegraph-Wackelzeit vor Abfahrt (F-5b, ÜBERGABE §1)
const LADDER_COOLDOWN = 1.5;             // kurzer Cooldown pro Leiter nach einer Abfahrt (Fable-Invariante), tunebar
// §8.3 [ANNAHME Ravi, Milo offen]: Sieg-Leiter (zu P4) nie scharf — laeuft jetzt ueber das win-Flag an LADDERS (s.o.), damit ALLE Leitern per Schalter steuerbar sind.
const LADDER_TEST_MODE = false;          // Spike/Feel-Check (ÜBERGABE §4-Alt.): Chance 1.0, keine App-Schwelle; Win-/Save-Flags bleiben aktiv
const LADDER_TEST_CHANCE = 1.0;
let ladderCD = [0,0,0,0];                // Rest-Cooldown je Leiter (Sekunden); Reset bei barrels=[] (initGame/nextAct)

// --- v0.9-bc (E-073/M1): Löcher — app-basiert generiert (KONZEPT v2 §2/H3, F-5) ---
// Regeln (F-5): nur P1–P3, nie unter Leitern (+28px Landepuffer), nie am Rand,
// >=90px Abstand zwischen Löchern, max 2 pro Ebene, Breite <= GAP_WMAX (< Sprungweite ~100px).
// Skalierung app-basiert (NICHT level-basiert wie im Vibe-Stand): App 1 lochfrei (F-3).
const GAPS=[];
const GAP_WMAX=60;   // harter Deckel (F-5), tunebar 36–60 (Holger: "ein Ticken kleiner")
const GAP_DROP_CHANCE=0.10; // Konzept-Wert: 10% ab App 3 (v0.9.1/E-074, Holger: F-5c)
const GAP_TEST_MODE=false;  // v0.11.16: Test-Phase beendet (Holger: STANDARD soll echte Rampe zeigen — App 1 lochfrei). Der Vorfuehr-Modus (App-Sprung) ersetzt den Test-Modus. Bei Bedarf wieder auf true: Chance s. GAP_TEST_CHANCE, keine App-3-Schwelle, min. 2 Loecher ab App 1.
const GAP_TEST_CHANCE=0.5;  // TEST: Durchfall-Chance im Test-Modus (Holger: 1.0 zum Durchfall-Check, 0.5 fuer den Misch-Lauf Huepfen/Fallen)
function gapCount(n=appsShipped){ const c=Math.min(n, 6); return GAP_TEST_MODE ? Math.max(2,c) : c; } // v0.9.1 (E-074, Holger): +1 Loch pro App — App2: 1, App3: 2 … Deckel 6; TEST-Modus: min. 2 Loecher schon ab App 1; Param n fuer Vorfuehr-Tafel (v0.11.13)
function gapBaseW(n=appsShipped){ return Math.min(56, 40+4*n); }                 // v0.9.1: flacher — 44 → 48 → 52 → 56 (±4 Jitter); Param n fuer Vorfuehr-Tafel
function generateGaps(){
  GAPS.length=0;
  const total=gapCount();
  const per={1:0,2:0,3:0};
  let guard=0;
  while(GAPS.length<total && guard++<300){
    const pi=1+Math.floor(Math.random()*3);
    if(per[pi]>=2) continue;                    // max 2 pro Ebene (F-5)
    const p=PLATS[pi];
    const w=Math.min(GAP_WMAX, gapBaseW()+Math.floor(Math.random()*9)-4);
    const x=p.x+22+Math.random()*(p.w-44-w);    // nie am Plattformrand
    let ok=true;
    for(const l of LADDERS){ if(x<l.x+LW+28 && x+w>l.x-28){ok=false;break;} }    // Leitern + Landepunkte frei
    if(ok) for(const g of GAPS){ if(g.plat===pi && x<g.x+g.w+90 && x+w>g.x-90){ok=false;break;} }
    if(!ok) continue;
    GAPS.push({plat:pi, x:Math.round(x), w:Math.round(w)});
    per[pi]++;
  }
}
function gapAt(pi,cxx){
  for(const g of GAPS) if(g.plat===pi && cxx>g.x && cxx<g.x+g.w) return g;
  return null;
}

// --- Input ---
// v0.11.18 (E-111): iOS-Zoom-Härtung — Safari ignoriert user-scalable=no seit iOS 10,
// und touch-action:none hat dort Lücken (Doppeltipp-Zoom beim Button-Mashing, Pinch beim
// Zwei-Daumen-Spielen). Pinch läuft über Apples proprietäre gesture*-Events, Doppeltipp
// über touchend — beides muss per preventDefault geblockt werden. Android unbeeinflusst.
['gesturestart','gesturechange','gestureend'].forEach(t =>
  document.addEventListener(t, e => e.preventDefault(), {passive:false}));
let lastTouchEnd = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTouchEnd < 350) e.preventDefault(); // Doppeltipp-Zoom unterdrücken
  lastTouchEnd = now;
}, {passive:false});
document.addEventListener('touchmove', e => {
  if (e.touches.length > 1) e.preventDefault(); // Mehrfinger = potenzielle Pinch-Geste
}, {passive:false});

const K = {};
// v0.11.26 (Zusatz A6): Steuertasten am Fokus abfangen, damit die Wirtsseite in der iframe-/Wix-Einbettung
// nicht scrollt (↑/↓/Leertaste). preventDefault unterbindet nur die Browser-Default-Aktion (Scroll) — die
// JS-Handler (K-State, Start via Space) laufen weiter. {passive:false}, sonst ignoriert der Browser preventDefault.
const GAME_KEYS = new Set(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space','KeyW','KeyA','KeyS','KeyD']);
window.addEventListener('keydown', e => { if(GAME_KEYS.has(e.code)) e.preventDefault(); K[e.code]=true; }, {passive:false});
window.addEventListener('keyup',   e => { K[e.code]=false; });
function mkBtn(id,code){
  const el=document.getElementById(id);

function ensureAC(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ AC=null; } } if(AC&&AC.state==='suspended') AC.resume(); return AC; }
function tone(f0,f1,dur,type,vol,at){ // Mini-Synth: ein Oszillator, Frequenz-Gleiter, Exp-Ausklang
  const ac=AC; if(!ac) return;
  const t=ac.currentTime+(at||0);
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type||'square'; o.frequency.setValueAtTime(f0,t);
  if(f1&&f1!==f0) o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol||0.06,t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(ac.destination);
  o.start(t); o.stop(t+dur+0.02);
}

function ladderAt(e){
  for(let i=0;i<LADDERS.length;i++){
    const l=LADDERS[i];
    if(e.x+e.w>l.x+2&&e.x<l.x+LW-2&&e.y+e.h>l.yt&&e.y<l.yb) return i;
  }
  return -1;
}

// --- H5: Helfer für Leiter-Abfahrt ---
// Leiterkopf auf der Ebene des Fasses, dessen x-Zone das Fass gerade quert (Punkt = Mittelpunkt,
// analog gapAt). yt jeder Leiter == y ihrer Kopf-Plattform (exakt, s. LADDERS/PLATS).
function ladderHeadAt(b){
  const cxx=b.x+b.w/2, py=PLATS[b.platIdx].y;
  for(let i=0;i<LADDERS.length;i++){
    const l=LADDERS[i];
    if(l.yt===py && cxx>l.x && cxx<l.x+LW) return i;
  }
  return -1;
}
// F-5b: Spieler klettert genau auf DIESER Leiter → Abfahrt darf weder starten noch (im Telegraph) auslösen.

// Rampe §1/§8.1: App 1–3 aus · App 4 Intro · App 5 · App 6+ Cap. (App = appsShipped+1.)
function ladderDropChance(n=appsShipped){
  if(n>=5) return 0.35;   // App 6+ (Cap, halten)
  if(n===4) return 0.30;  // App 5
  if(n===3) return 0.18;  // App 4 (Intro, Range 0,15–0,20)
  return 0;               // App 1–3
}
// Würfel + strukturelle Invarianten (einmal je Querung vom Aufrufer via lastLadder garantiert).
function ladderDropEligible(b, lh){
  if(LADDERS[lh].win) return false;                    // §8.3: Sieg-Leiter Win-Schutz (win-Flag an LADDERS, separat vom Savepoint)
  if(LADDERS[lh].save) return false;                   // H5 Savepoint-Leiter: keine Abfahrt — save-Flag je Leiter, s. LADDERS (tunebar fuers Balancing)
  if(ladderCD[lh]>0) return false;                     // Cooldown pro Leiter
  for(const o of barrels){                             // max. 1 aktive Abfahrt pro Ebene (1 Leiterkopf je Ebene)
    if(o!==b && o.ladderIdx===lh && (o.ladderTele>0||o.ladderDrop)) return false;
  }
  const chance = LADDER_TEST_MODE ? LADDER_TEST_CHANCE : ladderDropChance();
  return Math.random() < chance;
}

// Fund #5 (Review-Cleanup): gemeinsame Lande-Detektion fuer gapFall/ladderDrop/normalen Fall. Sucht die oberste
// Plattform < maxPi, deren y das Fass in DIESEM Frame quert (aufsteigende Schleife, dt-Cap-sicher), setzt
// y/vy/onGround/platIdx und liefert den Landeindex (-1 = nicht gelandet). b.vx bleibt unberuehrt — die
// zweig-spezifische Nach-Lande-Aktion (Richtung behalten vs. PLATS.dir, Flag-Resets) macht der Aufrufer.
function landBelow(b, dt, maxPi){
  if(b.vy<0) return -1;
  for(let pi=0;pi<maxPi;pi++){
    const p=PLATS[pi];
    if(gapAt(pi, b.x+b.w/2)) continue;                 // F-5c: nie in einer Luecke landen
    const prevB=b.y+b.h-b.vy*dt;
    if(prevB<=p.y+3&&b.y+b.h>=p.y&&b.x+b.w>p.x+4&&b.x<p.x+p.w-4){
      b.y=p.y-b.h;b.vy=0;b.onGround=true;b.platIdx=pi;
      return pi;
    }
  }
  return -1;
}

    holdT:0.45, // Sekunden stehen bleiben bevor Rollen
    _face:true, // Spawn-Fix 2026-07-06: Fass rollt nach dem Stehen immer nach links (Z.638, vx<0) -> _face vorab auf die Roll-Richtung latchen, sonst zeigt es waehrend holdT unges­piegelt (= verkehrt) und dreht sich erst beim Losrollen sichtbar um
  });
  kongThrowType=type;          // Gorilla wirft ein Fass in dieser Typ-Farbe
  kongThrowT=KONG_THROW_DUR;
}

// --- Player Update ---
// v0.11.25 (Sanft-Pass B4, E-138): Vergebungs-Schicht — Startwerte, Handy-Playtest zurrt fest.
const COYOTE=0.10;  // Sprung noch ~100 ms nach dem Verlassen der Kante möglich
const JUMPBUF=0.12; // Tap ~120 ms vor der Landung feuert bei der Landung
function updatePlayer(dt){
  if(P.dead){
    P.deathTimer-=dt;
    if(P.deathTimer<=0){
      lives--;
      if(lives<=0){
        state='over'; sfx('over');
        if(!demoRun){ // v0.11.13: Demo-Sprung-Laeufe schreiben keinen Rekord (Start in App 5 wuerde HS/HS_APPS verfaelschen)
        if(score>HS){ HS=score; try{localStorage.setItem('shb_bc_hs',HS);}catch(e){} }
        if(buildLoops>HS_LOOPS){ HS_LOOPS=buildLoops; try{localStorage.setItem('shb_bc_loops',HS_LOOPS);}catch(e){} }
        if(appsShipped>HS_APPS){ HS_APPS=appsShipped; try{localStorage.setItem('shb_bc_apps',HS_APPS);}catch(e){} } // v0.5-bc (A1)
        }
      } else {
        resetPlayer(); barrels=[]; ladderCD.fill(0); spawnFreeze=2; spawnT=2; hitFlash=0; spawnStopped=false; // M3: Zielgerade neu verdienen (H5: Cooldowns mit)
      }
    }
    return;
  }
  const li=ladderAt(P);
  // Leiter nur vom Boden aus greifen — verhindert mid-air Leiter-Snap
  if(li>=0&&UP()&&!P.climbing&&P.onGround){P.climbing=true;P.vy=0;}
  if(!P.climbing&&DN()&&P.onGround){
    for(let i=0;i<LADDERS.length;i++){
      const l=LADDERS[i];
      if(P.x+P.w>l.x+2&&P.x<l.x+LW-2&&Math.abs(P.y+P.h-l.yt)<12){
        P.climbing=true;P.onGround=false;P.vy=0;
        P.y+=6; // Füße in Leiterkollisions-Zone schieben (war exakt auf l.yt)
        P.x=l.x+LW/2-P.w/2; // auf Leitermitte zentrieren
        break;
      }
    }
  }
  if(li<0) P.climbing=false;
  if(P.climbing){
    const l=LADDERS[li>=0?li:0];
    if(li>=0) P.x+=(l.x+LW/2-P.w/2-P.x)*0.25;
    P.vx=0; P.vy=UP()?-88:DN()?85:0;
  } else {
    P.vx=L()?-158:R()?158:0;
    P.vy+=900*dt;
    // v0.11.25 (Sanft-Pass B4, E-138): frischer Tap = JP() & nicht gehalten (jumpLock). Springen am Boden ODER
    // kurz danach (Coyote). Zu früher Tap in der Luft wird gepuffert und feuert bei der Landung (Block unten).
    const freshJump = JP() && !P.jumpLock;
    if(freshJump && (P.onGround || P.coyoteT>0)){
      P.vy=-285;P.onGround=false;P.coyoteT=0;P.jumpBufT=0;P.jumpLock=true;sfx('jump'); // 285²/1800=45px — passt für 90px Abstand
    } else if(freshJump){
      P.jumpBufT=JUMPBUF; // Sprung-Puffer: Tap kurz vor der Landung merken
    }
    if(!JP()) P.jumpLock=false;
  }
  // v0.6-bc (E-066): sobald der Spieler losläuft, sofort das erste Fass — dann kontinuierlicher Zyklus
  if(!moveStarted && (L()||R()||UP()||DN())){ moveStarted=true; spawnFreeze=0; lastSpawn=null; }
  const prevY=P.y;
  P.x+=P.vx*dt; P.y+=P.vy*dt;
  P.x=Math.max(0,Math.min(GW-P.w,P.x));
  P.onGround=false;
  // Bug-Fix „endloser Sturz": am Leiter-Fuß sauber auf die Plattform absetzen (statt durchzufallen)
  if(P.climbing && P.vy>0){
    const cl=LADDERS[li>=0?li:0];
    if(cl && P.y+P.h>=cl.yb){ P.y=cl.yb-P.h; P.climbing=false; P.onGround=true; P.vy=0; }
  }
  if(!P.climbing&&P.vy>=0){
    for(let pi=0;pi<PLATS.length;pi++){
      const p=PLATS[pi];
      if(pi>0 && gapAt(pi, P.x+P.w/2)) continue; // v0.9 (M1): über einem Loch fängt nichts — Spieler fällt durch (P0/P4 nie gelocht, F-5)
      // P0 = solider Boden: fängt immer (kein Durchfallen ins Leere); obere Plattformen nur von oben
      const onX = P.x+P.w>p.x+6 && P.x<p.x+p.w-6;
      const catchY = P.y+P.h>=p.y && (pi===0 ? true : prevY+P.h<=p.y+3);
      if(onX&&catchY){
        P.y=p.y-P.h;P.vy=0;P.onGround=true;
        if(pi>0&&pi>P.highestPlat){
          P.highestPlat=pi;
          if(pi<4){const b=pi*200;score+=b;addFloat(P.x+P.w/2,P.y-8,'+'+b);sfx('plat');}
        }
        break;
      }
    }
  }
  // v0.11.25 (Sanft-Pass B4, E-138): Coyote-Fenster nachladen solange am Boden, sonst herunterzählen;
  // Sprung-Puffer herunterzählen und bei der Landung einlösen (jumpBufT wird nur aus der Luft gesetzt,
  // Leiter-Griff braucht Boden → am Leiterfuß nie gepuffert; kein Eingriff in H5).
  if(P.onGround) P.coyoteT=COYOTE; else P.coyoteT=Math.max(0,P.coyoteT-dt);
  P.jumpBufT=Math.max(0,P.jumpBufT-dt);
  if(P.onGround && !P.climbing && P.jumpBufT>0){
    P.vy=-285;P.onGround=false;P.coyoteT=0;P.jumpBufT=0;P.jumpLock=true;sfx('jump');
  }
  // v0.9 (E-073/M3): Sieg = Berührung der MAN-Box des SHB-Kollegen (vereinheitlicht mit Vibe; E-072-Gate bleibt)
  if(state==='play' && P.onGround && P.highestPlat>=4 && P.x+P.w>=WIN_BOX.x && P.x<=WIN_BOX.x+WIN_BOX.w){
    winBonus=1000+level*200; score+=winBonus;
    // v0.11.5 (E-100/Lena D-Nachtrag #1): Floater hier entfernt — fror waehrend winanim
    // eingefroren bei voller Deckkraft ein (Lebensdauer laeuft nur im state==='play'-Zweig
    // herunter) und schimmerte als Geist-Text hinter der Win-Karten-Vorschau durch. Die
    // Win-Karte zeigt den Bonus bereits prominent als "+PUNKTE" — der Floater war redundant.
    // Alle Floater leeren (nicht nur den Bonus-Floater): jeder andere frische Floater
    // (z.B. Fass-/Plattform-Bonus kurz vor dem Sieg) fröre aus demselben Grund genauso
    // eingefroren als Geist-Text ein.
    floaters=[];
    sfx('win'); winAnim=1.8; state='winanim';
  }
  if(P.y>GH+60){P.x=30;P.y=470;P.vy=0;}
  P.frameT+=dt;
  if(P.frameT>0.13){P.frame=(P.frame+1)%4;P.frameT=0;}
  // Passiver Zeit-Score nur außerhalb der Spawn-Freeze (sonst Gratis-Punkte bei unverwundbarem Stillstand im Akt-Intro/Respawn)
  if(spawnFreeze<=0){
    scoreAcc+=dt*10*level;
    const pts=scoreAcc|0;
    if(pts>0){score+=pts;scoreAcc-=pts;}
  }
}

// --- Barrel Update ---
function updateBarrels(dt){
  // Spawn-Freeze (E-025)
  if(spawnFreeze>0){ spawnFreeze-=dt; return; }

  // H5: Leiter-Cooldowns runterzählen
  for(let i=0;i<ladderCD.length;i++) if(ladderCD[i]>0) ladderCD[i]=Math.max(0, ladderCD[i]-dt);

  const MINGAP=Math.max(90, Math.round(actSpeed()*1.35)); // v0.11.25 (Sanft-Pass A1, E-138): Reaktionslücke 1,2→1,35 s (Fremdtester FT-2 + Holger 2026-07-11: Abstand am Handy fast nicht handhabbar), Floor 90 px. Startwert — Endwert aus Handy-Playtest
  // v0.11 (FT-2, Fremdtester): Wellen an der App statt am Akt — Start 3, +1 pro App, Deckel 5; dazwischen echte Atempause.
  const HARDCAP=6;                    // v0.11.25 (Sanft-Pass A2, E-138): 8→6, Gedränge auf dem kleinen Feld runter; Fallback 7 falls Nachschub sichtbar stockt (Grund für 5→8 in v0.11.2). Fairness trägt MINGAP. Startwert — Handy-Playtest
  const waveSize=Math.min(4, 2+appsShipped);  // v0.11.25 (Sanft-Pass A3, E-138): App 1: 2, App 2: 3, ab App 3: 4 Fässer pro Welle (war 3/4/5; Tester-Wunsch „3/Welle" nach unten gezogen). Startwert — Handy-Playtest
  const WAVE_PAUSE=0.5;               // v0.11.6 (E-104/Milo, Holger-Sichtcheck: >1 Etage leer): 1,0→0,5 s — Takt statt Vakuum; MINGAP bleibt Fairness-Boden. Range 0,4–0,6, Do-Playtest
  // v0.9.4 (E-077, Holger): Zielgerade erst auf P4 — Ankunft ganz oben stoppt den Nachschub, Stapel wird geräumt (E-076).
  // Der Sieg-Gang bleibt spannend: was schon rollt, rollt weiter. Banner erst, wenn der Schirm leer ist.
  const halted = !P.dead && P.y+P.h <= PLATS[4].y+4 && P.x+P.w/2 >= GW/2; // v0.9.6 (E-079, Holger): Stopp erst ab der Mitte von P4 („wo BETA steht")
  spawnHaltedNow = halted; // v0.9.2 (E-075): live fürs Rendering
  // v0.9.8 (E-081, Holger): NICHTS Sichtbares wird ausgeblendet — schon gespawnte Fässer (stehend/rollend) leben aus.
  // (E-076-Stapel-Räumung zurückgebaut: seit "Banner erst bei leerem Schirm" [E-077] lügt die Meldung nicht mehr.)
  if(halted && barrels.length===0 && !spawnStopped){ spawnStopped=true; addFloat(GW/2,175,'FÄSSER GESTOPPT!'); sfx('stop'); } // v0.9.4: Banner erst bei leerem Schirm — im selben Moment verschwindet der Vorrat (E-075)
  const topRowClear = !barrels.some(b => b.platIdx===4 && b.x > GW*0.45); // v0.9.8 (E-081, Holger): Welle 2 früher — P4 gilt als frei, sobald alle oben in der linken Hälfte sind (war: komplett leer)
  if(!halted && pendingWave===0 && barrels.length < HARDCAP){ // v0.11 (FT-2): Welle → Atempause → Welle. Pause endet frühestens WAVE_PAUSE s nach freier Top-Ebene.
    if(barrels.length===0){ pendingWave=waveSize; wavePauseT=0; }        // nie leer — sofort nachlegen
    else if(topRowClear){ wavePauseT+=dt; if(wavePauseT>=WAVE_PAUSE){ pendingWave=waveSize; wavePauseT=0; } }
    else wavePauseT=0;
  }
  if(!halted && pendingWave>0 && barrels.length < HARDCAP){
    // Welle Fass für Fass freigeben — aber nur wenn der Stapelplatz Mindestabstand frei ist
    const stageBusy = barrels.some(b => b.platIdx===4 && Math.abs(b.x-(BARREL_STAGE.x-28)) < MINGAP);
    if(!stageBusy){ spawnBarrel(); pendingWave--; }
  }

  for(let i=barrels.length-1;i>=0;i--){
    const b=barrels[i];
    // Halte-Phase: Fass steht kurz am Stapelplatz
    if(b.holdT>0){
      b.holdT-=dt;
      if(b.holdT<=0){ b.vx=-actSpeed()*BARREL_TYPES[b.type].spd; } // jetzt losrollen (v0.9/M2: Typ-Tempo)
      continue; // noch nicht physikupdaten
    }
    // H5/F-5b: Telegraph-Phase — Fass wackelt am Leiterkopf und steht still (kein x/y-Update).
    // Der Wackler ist der Tell „gleich fährt es ab"; drawBarrel zeichnet ihn aus b.ladderTele.
    if(b.ladderTele>0){
      if(playerOnLadder(b.ladderIdx)){ b.ladderTele=0; b.ladderIdx=-1; } // F-5b: Spieler betritt DIESE Leiter mitten im Telegraph -> Abbruch, Fass rollt nächsten Frame normal weiter (§8.6)
      else {
        b.ladderTele-=dt;
        if(b.ladderTele<=0){ b.onGround=false; b.vy=40; b.ladderDrop=true; ladderCD[b.ladderIdx]=LADDER_COOLDOWN; } // Abfahrt startet: Richtung+Tempo bleiben via b.vx erhalten (kein Reset); Leiter geht in Cooldown
      }
      // kein Movement — Kollision/Jump-Bonus/Anim laufen unten weiter (Fass ist eine echte Bedrohung, auch stehend)
    } else if(b.onGround){
      b.vy=0;
      const p=PLATS[b.platIdx];
      b.x+=b.vx*dt;
      // v0.9.1 (E-074, F-5c): Fass kippt mit 10% sichtbar durchs Loch (ab App 3) — einmal je Loch-Querung
      const gnow=gapAt(b.platIdx, b.x+b.w/2);
      if(gnow && b.lastGap!==gnow){
        b.lastGap=gnow;
        if((GAP_TEST_MODE||appsShipped>=3) && Math.random()<(GAP_TEST_MODE?GAP_TEST_CHANCE:GAP_DROP_CHANCE)){ b.onGround=false; b.vy=40; b.gapFall=true; continue; } // Durchfall E-074 (v0.11.25 Sanft-Pass A5: ab App 4 statt App 3, 10%); TEST-Modus s. GAP_TEST_MODE — siehe gapFall-Zweig unten
      } else if(!gnow){ b.lastGap=null; }
      // H5: Leiter-Abfahrt am Leiterkopf — einmal je Querung würfeln (lastLadder wie lastGap).
      // Treffer + Invarianten + F-5b (Spieler nicht auf DIESER Leiter) -> Telegraph starten, sonst rollt es weiter.
      const lh=ladderHeadAt(b);
      if(lh>=0){
        if(b.lastLadder!==lh){
          b.lastLadder=lh;
          if(ladderDropEligible(b, lh) && !playerOnLadder(lh)){ b.ladderTele=LADDER_TELE; b.ladderIdx=lh; } // b.vx unangetastet: Tempo/Richtung fürs Erhalten gemerkt
        }
      } else b.lastLadder=-1;
      b.y=p.y-b.h; // Hüpfer ist rein visuell in drawBarrel (v0.9.6/E-079 — exakt wie Vibe v0.6.0)
      const offR=b.vx>0&&b.x+b.w>p.x+p.w+5;
      const offL=b.vx<0&&b.x<p.x-5;
      if(offR||offL){b.onGround=false;b.vy=15;b.vx=0;}
    } else if(b.gapFall){
      // v0.11.9 (Holger, Root-Cause der Original-Meldung "springt zurueck"): Loch-Durchfall
      // (E-074/H3b) landet eine Ebene tiefer (pi<platIdx, Durchquerungs-Check, gapAt-Skip = F-5c) —
      // und BEHAELT dabei Richtung + Tempo (b.vx bleibt unangetastet). Die alte Zuweisung
      // b.vx = PLATS[pi].dir * ... drehte das Fass beim Landen ZWANGSLAEUFIG um (dir alterniert
      // pro Ebene) → es rollte unter der Luecke zurueck = die gemeldete Optik, kein Physik-Glitch.
      // Rollt es unten gegen den Plattform-Strom, faellt es an der Kante normal ab und die
      // uebernaechste Ebene hat wieder SEINE Richtung — der Fluss bleibt nahtlos ("einfach
      // weiterrollen", Abkuerzung nach unten). Historie: v0.11.7 (Landen nur auf Ursprungs-
      // Plattform, ohne Durchquerungs-Check) war eine Fehldeutung → Zucken statt Durchfall.
      b.vy+=900*dt; b.x+=b.vx*dt; b.y+=b.vy*dt;
      if(landBelow(b,dt,b.platIdx)>=0){ b.gapFall=false;b.lastGap=null; } // Fund #5: Lande-Detektion via Helper; b.vx bleibt (gleiche Richtung/Tempo, kein PLATS.dir)
    } else if(b.ladderDrop){
      // H5: Leiter-Abfahrt — eigener isolierter Zweig (Vorbild gapFall/H3b, ÜBERGABE §3).
      // Fass geht die Leiter HINUNTER: vertikal, x sanft auf Leitermitte. BEWUSST NICHT als Projektil
      // mit Horizontal-Impuls (b.x+=b.vx*dt) — das driftete an den Rand-Leitern L1/L3 (x36, direkt an
      // der Plattform-Kante) über den Rand hinaus und ließ das Fass VERSCHWINDEN statt landen
      // (Golden-Trace B, 2026-07-09). Richtung + Tempo (b.vx unangetastet) bleiben für das Weiterrollen
      // NACH der Landung erhalten — bewusst NICHT PLATS[pi].dir, sonst der „springt zurück"-Bug
      // (Bugreport-Nachtrag 2/3, §2/§8.2). Landung respektiert gapAt-Skip (F-5c); unten oft
      // Gegenstrom-Fass -> vom sanierten Klemm-Pass (v0.11.9–12) automatisch erfasst.
      const l=LADDERS[b.ladderIdx];
      b.x += (l.x+LW/2 - b.w/2 - b.x)*0.3; // die Leiter runter statt seitlich über die Kante driften
      b.vy+=900*dt; b.y+=b.vy*dt;
      if(landBelow(b,dt,b.platIdx)>=0){ b.ladderDrop=false;b.ladderIdx=-1;b.lastLadder=-1;b.lastGap=null; } // Fund #5: Lande-Detektion via Helper; b.vx bleibt
    } else {
      b.vy+=900*dt; b.x+=b.vx*dt; b.y+=b.vy*dt;
      const lp=landBelow(b,dt,PLATS.length); // Fund #5: Lande-Detektion via Helper (alle Plattformen)
      if(lp>=0){ b.vx=PLATS[lp].dir*actSpeed()*BARREL_TYPES[b.type].spd; } // v0.9/M2: Typ-Tempo, Richtung = Plattform-Strom
    }
    if(b.y>GH+80||b.x<-80||b.x>GW+80){barrels.splice(i,1);continue;}

    // Kollision
    if(!P.dead&&b.x+b.w-7>P.x+3&&b.x+7<P.x+P.w-3&&b.y+b.h-4>P.y+5&&b.y+4<P.y+P.h-2){ // v0.4.2 (T-4): Trefferbox enger
      P.dead=true;P.deathTimer=0.9;hitFlash=0.7;shake=0.28;sfx('death');
      barrels.splice(i,1);continue;
    }

    // Typisierter Jump-Bonus (E-019)
    if(!b.jumpScored&&!P.dead&&!P.onGround&&!P.climbing){ // v0.4.2-fix: auch im Aufstieg zaehlen (Punkte zuverlaessig)
      const bCx=b.x+b.w/2, pCx=P.x+P.w/2;
      if(Math.abs(bCx-pCx)<40&&b.y>=P.y+P.h-8&&b.y<=P.y+P.h+50){ // v0.4.2 (CC#6): Band weit genug fuer echte Spruenge, blockt aber Ebene tiefer (~90px)
        b.jumpScored=true;
        const jp=BARREL_TYPES[b.type].pts*level;
        score+=jp;
        addFloat(P.x+P.w/2,P.y-12,'+'+jp+' '+BARREL_TYPES[b.type].label+'!');sfx('bonus');
      }
    }
    b.frameT+=dt;
    if(b.frameT>0.08){b.frame=(b.frame+1)%8;b.frameT=0;}
  }

  // v0.6.2 (E-069, Holger): Mindestabstand auf derselben Plattform erzwingen — sonst überlagern sich Fässer
  // (z. B. wenn eins von oben neben ein rollendes fällt) und werden unüberspringbar. Der in Rollrichtung
  // hintere wird zurückgeklemmt, bis die Lücke wieder da ist. Garantiert F-1 (überspringbar) auch im Kaskaden-Fall.
  // Kaskaden-Guard nutzt MINGAP von oben — Fässer gleicher Plattform ≥ MINGAP auseinander
  for(let i=0;i<barrels.length;i++){
    for(let j=i+1;j<barrels.length;j++){
      const a=barrels[i], b=barrels[j];
      if(a.platIdx!==b.platIdx || !a.onGround || !b.onGround || a.holdT>0 || b.holdT>0 || a.ladderTele>0 || b.ladderTele>0) continue; // H5: telegraphierendes Fass steht -> nicht klemmen (wie Halte-Fass)
      if((a.vx>0)!==(b.vx>0)) continue; // v0.11.9: Gegenstrom-Fass (Loch-Durchfall behaelt Richtung) — Begegnungs-Paare nicht klemmen, sonst schiebt eins das andere rueckwaerts ("springt zurueck"-Optik); kurzes Kreuzen ist ok
      if(Math.abs(a.x-b.x) >= MINGAP) continue;
      const dir=a.vx>0?1:-1;                          // Rollrichtung des Paars (nach Durchfall ggf. != PLATS.dir; Vorzeichen oben als gleich geprueft)
      // v0.11.11 (Ravi — ersetzt den F-4-Push komplett; ROOT-CAUSE "Fass springt am Loch zurueck"):
      // (1) Beruehrt der Hintere eine Loch-Zone (IRGENDEIN Teil des Fasses, nicht nur der Mittel-
      //     punkt), wird das Paar NICHT geklemmt — er quert frei. Ueber einem Loch kann der Spieler
      //     nie stehen (er faellt durch, E-073/M1), also ist die Sprung-Fairness (F-1) dort gegen-
      //     standslos; F-4 ("nie in eine Loch-Zone klemmen") ist erfuellt, weil dort gar nicht mehr
      //     geklemmt wird. Vorher: Push teleportierte ~15px hinter den Rand (Holgers "halbe Fass-
      //     laenge drueber, dann Ruecksprung"); das v0.11.10-Kanten-Parken stallte/ruckelte ebenso.
      // (2) Klemm-Korrektur weich: max 360 px/s statt Sofort-Setzen — Abstands-Verletzungen (z.B.
      //     Landung von oben) loesen sich in ~0,25s auf, ohne sichtbaren Sprung. Im Dauer-Verfolgungs-
      //     fall (Tempo-Differenz ~1-2 px/Frame) greift der Deckel nie → Verhalten wie bisher.
      const back = dir>0 ? (a.x<b.x?a:b) : (a.x>b.x?a:b);
      let nearGap=false;
      for(const g of GAPS){ if(g.plat===back.platIdx && back.x<g.x+g.w && back.x+back.w>g.x){ nearGap=true; break; } }
      if(nearGap) continue;
      const corr=Math.min(360*dt, MINGAP-Math.abs(a.x-b.x));
      if(dir>0){ if(a.x<b.x) a.x-=corr; else b.x-=corr; }   // nach rechts: hinten = kleineres x
      else     { if(a.x>b.x) a.x+=corr; else b.x+=corr; }   // nach links:  hinten = größeres x
      // v0.11.12 (Ravi, Holger-Fund P0 rechts): nie ueber die Plattform-Kante hinausklemmen —
      // zwei Linksroller nahe der rechten Kante schoben den Hinteren sonst offscreen (bzw. ab
      // +80px in die Aufraeum-Loeschung). Fass bleibt an der Kante stehen, bis der Vordermann
      // Platz macht; der Abstand stellt sich dann von selbst wieder her.
      const pB=PLATS[back.platIdx];
      if(back.x < pB.x) back.x = pB.x;
      else if(back.x > pB.x+pB.w-back.w) back.x = pB.x+pB.w-back.w;
    }
  }
}

// --- v0.10.1-bc (E-085, Lena/Juno): Hintergrund-Pass — Nachthimmel + ferne Skyline statt Kästchen-Gitter ---
// R-046 "Code wiederholt": rein programmatisch, 0 Assets, deterministisch (Seed-LCG, kein Frame-Rauschen).
// Kontrast-Gate #035: Silhouette DUNKLER als C.bg — Gameplay bleibt die hellste Ebene.
// E-061-Einwand gelöst durch Trennung: App-Skyline oben links = hell/leuchtend, Stadt unten = dunkle Silhouette.
let BG_GRAD=null, BG_GLOW=null, HUD_GRAD=null;
function bgInitGrads(){
  if(BG_GRAD) return;
  BG_GRAD=cx.createLinearGradient(0,0,0,GH);
  BG_GRAD.addColorStop(0,'#12122e'); BG_GRAD.addColorStop(0.5,'#1a1a4e'); BG_GRAD.addColorStop(1,'#14143c');
  BG_GLOW=cx.createLinearGradient(0,414,0,490); // Stadtlicht-Schimmer überm Horizont, sehr leise
  BG_GLOW.addColorStop(0,'rgba(74,159,212,0)'); BG_GLOW.addColorStop(1,'rgba(74,159,212,0.07)');
  HUD_GRAD=cx.createLinearGradient(0,0,0,38); // v0.10.2 (E-086, Juno): HUD-Panel statt schwarzem Balken
  HUD_GRAD.addColorStop(0,'rgba(6,6,24,0.92)'); HUD_GRAD.addColorStop(1,'rgba(13,13,46,0.78)');
}
const STARS=[], BIGSTARS=[], BG_CITY=[];
{ let s=42; const rnd=()=>((s=(s*1103515245+12345)&0x7fffffff)/0x7fffffff);
  for(let i=0;i<44;i++) STARS.push({x:(rnd()*GW)|0, y:(rnd()*260)|0, a:0.08+rnd()*0.2, tw:(rnd()*11)|0});
  for(let i=0;i<5;i++) BIGSTARS.push({x:8+((rnd()*(GW-16))|0), y:44+((rnd()*160)|0), tw:(rnd()*7)|0}); // E-086: wenige helle Glint-Sterne
  let bx=-8;
  while(bx<GW+16){ const w=16+((rnd()*26)|0), h=24+((rnd()*56)|0);
    BG_CITY.push({x:bx, w, h, ant:rnd()<0.3}); bx+=w+3+((rnd()*12)|0); }
}
function drawBackdrop(){
  bgInitGrads();
  cx.fillStyle=BG_GRAD; cx.fillRect(0,0,GW,GH);
  const t=(Date.now()/700)|0;
  for(const st of STARS){ if((t+st.tw)%13===0) continue; // langsames, versetztes Funkeln
    cx.fillStyle='rgba(200,220,255,'+st.a+')'; cx.fillRect(st.x,st.y,1,1); } // 1 px = Punkte, keine Kacheln
  for(const bs of BIGSTARS){ if((t+bs.tw)%9>6) continue; // v0.10.2 (E-086): Glint-Sterne — 2 px + Kreuz-Schimmer, ruhig
    cx.fillStyle='rgba(210,230,255,0.30)'; cx.fillRect(bs.x,bs.y,2,2);
    cx.fillStyle='rgba(210,230,255,0.13)';
    cx.fillRect(bs.x-1,bs.y,1,2); cx.fillRect(bs.x+2,bs.y,1,2); cx.fillRect(bs.x,bs.y-1,2,1); cx.fillRect(bs.x,bs.y+2,2,1);
  }
  // v0.10.2 (E-086, Juno): Mond-Sichel — ruhiger Anker, bewusst zwischen App-Skyline (links) und Gorilla/Spawn (rechts)
  cx.fillStyle='rgba(205,220,245,0.20)'; cx.beginPath(); cx.arc(196,80,11,0,Math.PI*2); cx.fill();
  cx.fillStyle='#15153e'; cx.beginPath(); cx.arc(201,76,9,0,Math.PI*2); cx.fill();
  cx.fillStyle=BG_GLOW; cx.fillRect(0,414,GW,76);
  for(let i=0;i<BG_CITY.length;i++){ const b=BG_CITY[i];
    cx.fillStyle='rgba(9,9,30,0.9)'; cx.fillRect(b.x,490-b.h,b.w,b.h);            // Silhouette (dunkler als bg)
    if(b.ant) cx.fillRect(b.x+((b.w/2)|0),490-b.h-6,1,6);                          // Antenne bricht die Kastenkante
    cx.fillStyle='rgba(107,189,224,0.08)'; cx.fillRect(b.x,490-b.h,b.w,1);         // hauchdünne Dachkante
    cx.fillStyle='rgba(245,196,0,0.16)';                                            // spärliche Fenster, deterministisch
    for(let wy=490-b.h+5; wy<482; wy+=13){ if((i*7+wy)%4===0) cx.fillRect(b.x+2+((i*5+wy)%Math.max(3,b.w-5)),wy,2,2); }
  }
}

// --- RENDER ---
function render(){
  cx.imageSmoothingEnabled=false;
  drawBackdrop(); // v0.10.1 (E-085, Lena/Juno): Nachthimmel + ferne Skyline — ersetzt das Kästchen-Gitter
  cx.save(); if(shake>0) cx.translate((Math.random()*4-2)|0,(Math.random()*4-2)|0); // v0.10 (E-067): Death-Shake, ~0,28s, dezent
  // v0.9 (E-073/M5a): Ambient — Signal-Lichter im Himmel (A-3: der Schirm lebt immer, 0 Assets, R-046)
  const TWK=[[30,70],[105,58],[168,84],[236,64],[352,46],[86,100],[300,48],[210,102]];
  const tnow=Date.now()/500|0;
  for(let ti=0;ti<TWK.length;ti++){
    if((tnow+ti*5)%9<2){ cx.fillStyle='rgba(107,189,224,0.5)'; cx.fillRect(TWK[ti][0],TWK[ti][1],2,2); }
  }

  // Leitern — tile-ladder (6x16) vertikal gekachelt, auf LW=18 gestreckt
  for(const l of LADDERS){
    if(SPRITES['tile-ladder']){
      for(let ry=l.yt; ry<l.yb; ry+=16){
        const h=Math.min(16, l.yb-ry);
        cx.drawImage(SPRITES['tile-ladder'], 0,0,18,h, l.x, ry, LW, h); // Quelle beschneiden statt stauchen
      }
    } else {
      cx.fillStyle=C.blu;
      cx.fillRect(l.x,l.yt,3,l.yb-l.yt);
      cx.fillRect(l.x+LW-3,l.yt,3,l.yb-l.yt);
      cx.fillStyle=C.blul;
      for(let ry=l.yt+7;ry<l.yb;ry+=12) cx.fillRect(l.x+3,ry,LW-6,3);
    }
  }

  // Plattformen + Boden
  for(let pi=0;pi<PLATS.length;pi++){
    const p=PLATS[pi];
    if(pi===0 && SPRITES['tile-floor']){
      // v0.9.7 (E-080, Holger): Boden-Kisten kleiner (48→24), zwei Reihen bis y≈538 — die Steuer-Hinweis-Zeile (y552) bleibt frei lesbar
      for(let fy=p.y; fy<p.y+48; fy+=24)
        for(let fx=0; fx<GW; fx+=24)
          cx.drawImage(SPRITES['tile-floor'], fx, fy, 24, 24);
    } else if(SKIN==='strasse' && SPRITES['tile-strasse']){
      // E-122 (Version B): Strassen-Skin — schlanke 16px-Plattform wie die Stahltraeger, um 5px angehoben (p.y-8),
      // damit Figur/Fass mittig auf der Fahrbahn zwischen den Bordsteinen sitzen. Rein optisch: Kollision bleibt bei p.y/p.h.
      // E-124/#035-AUFLAGE: Der Bordstein (#d96914, 4,59:1) ist der Kontrast-Traeger der Plattformkante und MUSS ungestaucht
      // an jeder Kante durchgehend sichtbar bleiben. Darum drei getrennte Zeichenschritte statt der gestauchten Voll-Quelle:
      // Asphalt (grau, unkritisch, Stauchung erlaubt) + Bordstein oben/unten je mit FESTER, nicht mitskalierender Hoehe.
      const ph=16, ptop=p.y-8, cH=3;                                                       // Band 16px; Bordstein je 3px fest (>=2px Ist-Hoehe am Schirm)
      cx.fillStyle='#5c5c5c'; cx.fillRect(p.x, ptop, p.w, ph);                             // Asphalt-Grundfarbe deckt die transparente Quell-Naht
      cx.drawImage(SPRITES['tile-strasse'], 0, 300, 512,  80, p.x, ptop+cH, p.w, ph-2*cH); // Asphalt-Textur (grau, darf gestaucht werden)
      cx.drawImage(SPRITES['tile-strasse'], 0, 232, 512,  16, p.x, ptop,        p.w, cH);  // Bordstein OBEN — volle p.w, kein Math.min, keine Kanten-Beschneidung
      cx.drawImage(SPRITES['tile-strasse'], 0, 420, 512,  12, p.x, ptop+ph-cH,  p.w, cH);  // Bordstein UNTEN — volle p.w
    } else if(SPRITES['tile-platform']){
      // Gerüst-Balken (32x16) horizontal gekachelt, Oberkante ~p.y
      for(let gx=p.x; gx<p.x+p.w; gx+=32){
        const gw=Math.min(32, p.x+p.w-gx);
        cx.drawImage(SPRITES['tile-platform'], 0, 0, gw, 16, gx, p.y-3, gw, 16);
      }
    } else {
      cx.fillStyle=pi===4?C.wht:C.yel;
      cx.fillRect(p.x,p.y,p.w,p.h);
      cx.fillStyle='rgba(0,0,0,0.18)';
      for(let gx=p.x+16;gx<p.x+p.w-6;gx+=18) cx.fillRect(gx,p.y,1,p.h);
    }
    // v0.9 (E-073/M1): Loch-Aussparung + sichtbare Bruchkanten (Lena §6 — in 2s als Loch lesbar)
    if(pi>=1&&pi<=3){
      // E-122 (Version B): Loch-Aussparung folgt der Bandhoehe des aktiven Skins — Strasse ist um p.y-8 angehoben,
      // Geruest liegt bei p.y-3. Ohne diese Verzweigung schwebt in einer der beiden Varianten das Loch falsch (Cross-Ref #086).
      const gTop = (SKIN==='strasse') ? p.y-8 : p.y-3;
      const gMk  = (SKIN==='strasse') ? 16    : 13;   // Bruchkanten-Marker: Strasse volles Band, Geruest wie bisher
      for(const g of GAPS){ if(g.plat!==pi) continue;
        cx.fillStyle=C.bg; cx.fillRect(g.x, gTop, g.w, 16);
        cx.fillStyle=C.yel; cx.fillRect(g.x-2, gTop, 2, gMk); cx.fillRect(g.x+g.w, gTop, 2, gMk);
      }
    }
    // v0.11.5 (E-100/Lena D-Nachtrag 2): Label nur waehrend der Feature-Banner-Phase (spawnFreeze>0) —
    // seit D1 traegt die HUD-Projekt-Zeile die Info dauerhaft; im laufenden Spiel rollten Faesser durch den Text
    if(pi===4 && state!=='winanim' && spawnFreeze>0){
      cx.fillStyle=C.yel;cx.font='8px "Press Start 2P"';cx.textAlign='center';
      cx.fillText(ACT_GOAL[act],p.x+p.w/2,p.y-7);
    }
  }

  // v0.9.2 (E-075, Holger): Fass-Vorrat am Stapelplatz — „alle Fässer weg = Fass weg"
  // (macht den Spawn-Stopp in der Welt lesbar: Vorrat verschwindet, der Weg zum Kollegen ist frei)
  if(state!=='menu' && !spawnHaltedNow){ // v0.9.5 (E-078, Lena): Vorrat verschwindet bei P4-Ankunft — Quelle versiegt, Restfässer rollen aus
    // v0.9.3 (E-076, Holger-Bug 2): Vorrat steht HINTER dem Kollegen (x352, war x272 mitten im Sieg-Weg)
    if(SPRITES['barrel-stehend']){ const bw=15,bh=20,sx=366,yo=6; // kleiner + 2 gestapelt + yo: tiefer auf den Balken (steht auf dem Boden statt dahinter) — Holger 2026-07-05
      cx.drawImage(SPRITES['barrel-stehend'], sx,   PLATS[4].y-bh+yo,        bw, bh); // unteres
      cx.drawImage(SPRITES['barrel-stehend'], sx+1, PLATS[4].y-bh-(bh-3)+yo, bw, bh); // oberes (sitzt auf dem unteren)
    }
    else { cx.fillStyle=C.blu; cx.fillRect(366, PLATS[4].y-22, 15, 22); }
  }

  // Fässer
  for(const b of barrels) drawBarrel(b);

  // Spieler
  drawPlayer();

  // Floaters
  cx.textAlign='center';cx.font='8px "Press Start 2P"';
  for(const f of floaters){
    const a=Math.min(1,f.life*1.5);
    cx.globalAlpha=a;
    cx.fillStyle=f.text.includes('SCH')?C.yel:f.text.includes('!')?C.blul:C.yel;
    cx.fillText(f.text,f.x,f.y);
  }
  cx.globalAlpha=1;

  // HUD zuerst → Gorilla danach (damit Gorilla nicht vom HUD-Balken verdeckt wird)
  drawHUD();
  // v0.11.1 (Holger-Sichtcheck): Monitor-Icon oben rechts raus („wirkt nicht") — App-Fortschritt tragen HUD-Zeile + Skyline; Funktion in v0.11.3 gelöscht (CC-Review #6)
  drawKong();

  if(hitFlash>0){
    cx.fillStyle=`rgba(255,50,50,${hitFlash*0.3})`;
    cx.fillRect(0,0,GW,GH);
  }

  // Gebäude-Tutorial-Popup (nach erstem Loop)
  if(buildTutTimer>0){
    const fade=(DEV_BUILD&&buildTutTimer>=6.9)?1:Math.min(1,Math.min(buildTutTimer,7.0-buildTutTimer+0.3)/0.4); // v0.11.3 (CC-Review #4): im DEV-Freeze volle Deckkraft statt 75 %
    cx.globalAlpha=Math.max(0,fade);
    // v0.4.3: Vollbild-Abdunkler -> Plattformen/Labels treten zurueck, kein Kanten-Clash
    cx.fillStyle='rgba(13,13,46,0.82)'; cx.fillRect(0,0,GW,GH);
    const px=30,py=GH/2-95,pw=GW-60,ph=188; // v0.11.1: Panel höher — Konzept-Zeilen + Monitor-Reihe entzerrt
    cx.fillStyle='rgba(10,10,40,0.98)'; cx.fillRect(px,py,pw,ph);
    cx.strokeStyle=C.yel;cx.lineWidth=2; cx.strokeRect(px,py,pw,ph);

    cx.textAlign='center';
    cx.fillStyle=C.yel;cx.font='9px "Press Start 2P"';
    cx.fillText('SO ENTSTEHT DEINE APP:',GW/2,py+20); // v0.11.1 (E-097): Konzept sichtbar erklärt (Holger)
    cx.fillStyle='rgba(255,255,255,0.85)';cx.font='8px "Press Start 2P"';
    cx.fillText('PROTOTYP → BETA → LIVE',GW/2,py+38);
    cx.fillText('= 1 FEATURE',GW/2,py+50);

    // 5 Stufen nebeneinander visualisieren
    const stages=[1,2,3,4,5];
    const sw=40,sh=44,sgap=8;
    const stot=stages.length*(sw+sgap)-sgap;
    let sx=GW/2-stot/2;
    stages.forEach(s=>{
      drawBuildingShape(sx,py+58,s,sw,sh,false);
      // Stufen-Label
      cx.fillStyle=s===buildLoops?C.yel:'rgba(255,255,255,0.4)';
      cx.font='8px "Press Start 2P"';cx.textAlign='center';
      cx.fillText(s,sx+sw/2,py+112);
      if(s===buildLoops){
        cx.fillStyle=C.yel;cx.font='8px "Press Start 2P"';
        cx.fillText('DU',sx+sw/2,py+124);
      }
      sx+=sw+sgap;
    });

    cx.fillStyle='rgba(255,255,255,0.7)';cx.font='8px "Press Start 2P"';cx.textAlign='center';
    cx.fillText('PRO FEATURE WÄCHST DIE APP',GW/2,py+142); // v0.11.1 (E-097)
    cx.fillStyle=C.blu;cx.font='8px "Press Start 2P"';
    cx.fillText('TIPPEN = LOS GEHTS!',GW/2,py+160);

    // Fortschrittsbalken
    const prog=buildTutTimer/7.0; // v0.11.1: länger lesbar
    cx.fillStyle='rgba(255,255,255,0.15)';cx.fillRect(px+16,py+ph-12,pw-32,6);
    cx.fillStyle=C.yel;cx.fillRect(px+16,py+ph-12,Math.round((pw-32)*prog),6);
    cx.globalAlpha=1;
  }

  // Akt-Intro Banner während Spawn-Freeze (nicht während des Tutorials -> kein Ueberblenden, v0.4.3)
  if(state==='play' && spawnFreeze>0 && buildTutTimer<=0){
    const fadeIn=Math.min(1,(2.5-spawnFreeze)/0.3);
    const fadeOut=spawnFreeze<0.5?spawnFreeze/0.5:1;
    const a=Math.min(fadeIn,fadeOut);
    cx.globalAlpha=a;
    cx.fillStyle='rgba(13,13,46,0.85)';cx.fillRect(20,GH/2-54,GW-40,100);
    cx.strokeStyle=C.blu;cx.lineWidth=2;cx.strokeRect(20,GH/2-54,GW-40,100);
    cx.textAlign='center';
    cx.fillStyle=C.yel;cx.font='10px "Press Start 2P"';
    cx.fillText('FEATURE '+(featsIntoApp+1)+' — '+ACT_GOAL[act],GW/2,GH/2-28); // v0.11.1 (E-097): Feature + Stufe (PROTOTYP/BETA/LIVE)
    cx.fillStyle=C.wht;cx.font='8px "Press Start 2P"';
    cx.fillText(ACT_DESC[act],GW/2,GH/2-6);
    // Barrel-Icons — v0.11.2 (Holger): Letter VOR dem Fass, wie im Startschirm
    const types=ACT_TYPES[act];
    const bw=28,bg=10,lw=14,tot=types.length*(lw+bw+bg)-bg;
    let bxi=GW/2-tot/2;
    types.forEach(k=>{
      drawBarrelBig(k,bxi,GH/2+8,bw+lw,20); // v0.11.6 (E-104): ein grosses Fass statt Letter+Fass nebeneinander
      bxi+=lw+bw+bg;
    });
    cx.globalAlpha=1;
  }

  // v0.5.2 (E-063, Holger): Steuer-Hinweis am unteren Rand — Sicherheitsnetz, falls die Startseite uebersprungen wurde
  if(state==='play' && !isTouch){
    cx.textAlign='center'; cx.font='6px "Press Start 2P"';
    cx.fillStyle='rgba(0,0,0,0.55)'; cx.fillText('← →  LAUFEN    ↑  LEITER    SPACE  SPRINGEN', GW/2, 553);
    cx.fillStyle='rgba(255,255,255,0.62)'; cx.fillText('← →  LAUFEN    ↑  LEITER    SPACE  SPRINGEN', GW/2, 552);
  }

  if(state==='menu')    drawMenu();
  if(state==='over')    drawOver();
  if(state==='winanim') drawWin();

  cx.restore(); // Shake-Ende (E-067)
  drawSndBtn(); // v0.10 (E-067): Mute-Toggle — Mute-by-default (Kundentag-Auflage)

  // v0.9.7 (E-080, Holger): Dev-Versionsanzeige — nur während der Entwicklung (DEV_BUILD=false vorm Kundentag)
  if(DEV_BUILD){
    cx.textAlign='left'; cx.font='6px "Press Start 2P"';
    cx.fillStyle='rgba(255,255,255,0.45)'; cx.fillText(VERSION, 6, 78);
    // E-122 (Version B, Risiko-Mitigation): aktiven Skin klein anzeigen, damit ?skin=strasse beim Vorfuehren nicht unbemerkt fehlt
    cx.fillStyle=(SKIN==='strasse')?'rgba(217,105,20,0.9)':'rgba(255,255,255,0.35)'; cx.fillText('SKIN:'+SKIN.toUpperCase(), 6, 87);
    // v0.11.13: Vorfuehr-Modus-Button (nur DEV, verschwindet mit DEV_BUILD=false)
    const d=DEMO_BOX;
    cx.fillStyle=demoOpen?'rgba(74,159,212,0.85)':'rgba(13,13,46,0.8)'; cx.fillRect(d.x,d.y,d.w,d.h);
    cx.strokeStyle='rgba(255,255,255,0.5)'; cx.lineWidth=1; cx.strokeRect(d.x+0.5,d.y+0.5,d.w-1,d.h-1);
    cx.textAlign='center'; cx.font='6px "Press Start 2P"'; cx.fillStyle=C.wht;
    cx.fillText('DEMO', d.x+d.w/2, d.y+10);
    if(demoOpen) drawDemoPanel();
  }
}

// --- v0.11.13 (Vorfuehr-Modus, Holger/Ravi): Rampen-Tafel — LIVE aus den Spiel-Formeln gerechnet ---
// (actSpeed/gapCount/gapBaseW mit App-Parameter = dieselben Funktionen wie das Spiel; nichts abgetippt,
// die Tafel kann nicht driften, wenn getunt wird. Welle = Formel aus updateBarrels, dort lokal.)
function drawDemoPanel(){
  DEMO_ROWS.length=0;
  cx.fillStyle='rgba(6,6,24,0.94)'; cx.fillRect(12,70,GW-24,300);
  cx.strokeStyle=C.blu; cx.lineWidth=2; cx.strokeRect(12,70,GW-24,300);
  cx.textAlign='center'; cx.fillStyle=C.yel; cx.font='10px "Press Start 2P"';
  cx.fillText('VORFÜHR-MODUS', GW/2, 92);
  cx.font='6px "Press Start 2P"'; cx.fillStyle=C.wht;
  cx.fillText('ZEILE ANTIPPEN = NEUSTART IN DER APP (LIVE-AKT)', GW/2, 106);
  const col={app:32, tempo:86, loch:152, typ:230, welle:322, fall:362};
  cx.fillStyle='rgba(255,255,255,0.55)';
  cx.fillText('APP',col.app,124); cx.fillText('TEMPO',col.tempo,124); cx.fillText('LÖCHER',col.loch,124);
  cx.fillText('FÄSSER',col.typ,124); cx.fillText('WELLE',col.welle,124); cx.fillText('FALL',col.fall,124);
  for(let n=0;n<6;n++){
    const y=136+n*28;
    DEMO_ROWS.push({n:n+1, x:16, y:y-4, w:GW-32, h:26});
    if(n===Math.min(appsShipped,5) && state!=='menu'){ cx.fillStyle='rgba(74,159,212,0.18)'; cx.fillRect(16,y-4,GW-32,26); } // aktuelle App markieren
    cx.strokeStyle='rgba(255,255,255,0.12)'; cx.lineWidth=1; cx.beginPath(); cx.moveTo(16,y+22); cx.lineTo(GW-16,y+22); cx.stroke();
    cx.font='8px "Press Start 2P"'; cx.fillStyle=C.yel; cx.textAlign='center';
    cx.fillText(String(n+1), col.app, y+13);
    cx.font='6px "Press Start 2P"'; cx.fillStyle=C.wht;
    cx.fillText(actSpeed(n)+' PX/S', col.tempo, y+13);
    const gc=gapCount(n);
    cx.fillText(gc===0?'—':gc+' × '+gapBaseW(n)+'PX', col.loch, y+13);
    const tl = n<APP_TYPES.length ? APP_TYPES[n] : Object.keys(BARREL_TYPES); // ab App 4: alle Typen
    let tx=col.typ-(tl.length-1)*7;
    for(const k of tl){ cx.fillStyle=BARREL_TYPES[k].color; cx.fillText(BARREL_TYPES[k].label[0], tx, y+13); tx+=14; }
    cx.fillStyle=C.wht;
    cx.fillText(String(Math.min(4,2+n)), col.welle, y+13);                    // = waveSize-Formel (updateBarrels), v0.11.25 A3
    const dc=GAP_TEST_MODE ? GAP_TEST_CHANCE : (n>=3 ? GAP_DROP_CHANCE : 0);  // = Durchfall-Bedingung (updateBarrels), v0.11.25 A5 (ab App 4)
    cx.fillText(gc>0&&dc>0 ? Math.round(dc*100)+'%' : '—', col.fall, y+13);

// --- Gorilla (E-029: Zappel + Push) ---
function drawKong(){
  // Sprite-Box 109x123 (native), Fußlinie bei y=121. Verhältnis-treu skaliert (kein Stauchen).
  const BW=109, BH=123, FEET=121;
  const KH=76, KW=Math.round(KH*BW/BH), sc=KH/BH;
  const kx=304;                                   // Bein-Anker ~ alte Gorilla-Position
  const ky=PLATS[4].y - Math.round(FEET*sc) + 2;  // Füße auf P4
  // Idle steht ruhig (kein Fass!), leichtes Wobble; während des Wurfs kein Wobble
  const wobbleX = kongThrowT>0 ? 0 : Math.sin(kongWobble*80)*1.2;

  // --- Wurf: Fass NUR beim Werfen, in der Farbe des gespawnten Typs (langsame 3-Frame-Sequenz) ---
  if(kongThrowT>0){
    const sh=SPRITES['gorilla-throw-'+kongThrowType];
    if(sh){
      const p = 1 - (kongThrowT/KONG_THROW_DUR);          // 0..1
      const fi = p<0.45 ? 0 : p<0.72 ? 1 : p<0.92 ? 2 : -1; // halten → winden → runter → Release(=Idle)
      if(fi>=0){
        cx.drawImage(sh, fi*BW,0,BW,BH, kx+wobbleX,ky, KW,KH);
        // v0.11.6 (T2, Holger: "nehmt das alte Bild, sieht besser aus als der Farbklecks") — Layover-Patch (E-105/R2) wieder raus,
        // originales Wurf-Sprite mit dem eingebrannten Buchstaben bleibt unangetastet.
        return;
      }
    }
  }
  // --- Idle (kein Fass) ---
  if(SPRITES['gorilla-idle']){
    cx.drawImage(SPRITES['gorilla-idle'], kx+wobbleX,ky, KW,KH);
    return;
  }
  // Fallback Canvas-Gorilla (falls PNGs fehlen)
  const ox=kx+wobbleX, oy=ky+Math.round(FEET*sc)-40;
  cx.fillStyle='#2a1a5e';
  cx.fillRect(ox,oy,28,34); cx.fillRect(ox+2,oy-10,24,14);
  cx.fillRect(ox-6,oy+4,8,18); cx.fillRect(ox+26,oy+4,8,18);
  cx.fillStyle=C.yel; cx.fillRect(ox+12,oy+16,4,12);
}

// --- Sprite-Sheet-Helper (Integration 2026-06-28): zeichnet Frame f aus horizontalem Sheet ---
function drawSheet(key, frame, frames, dx, dy, dw, dh){
  const img=SPRITES[key];
  if(!img) return false;
  const fw=img.width/frames, fh=img.height;
  cx.drawImage(img, (((frame%frames)+frames)%frames)*fw, 0, fw, fh, dx, dy, dw, dh);
  return true;
}

  else if(!drawSheet('barrel-'+type+'-sheet', 0, 8, dx, dy, dw, dh)){

    cx.fillStyle='#ffffff';          cx.fillText(ch, dx+dw/2,   dy+dh/2+fs*0.55);
  }
}

// --- Barrel zeichnen — 8-Frame-Roll-Sheet (39x30), Badge eingebrannt ---
function drawBarrel(b){
  // v0.9.6 (E-079): Hüpfer 1:1 aus der Vibe-Version (v0.6.0) — leichter Anstieg, dann Abstieg; rein visuell
  let hop=0;
  if(b.onGround){
    const g=gapAt(b.platIdx, b.x+b.w/2);
    if(g){ const gt=Math.max(0,Math.min(1,(b.x+b.w/2-g.x)/g.w)); hop=Math.sin(Math.PI*gt)*12; }
  }
  // H5/F-5b: Wackel-Telegraph — Fass zittert ~0,3 s am Leiterkopf („gleich fährt es ab").
  const wob = b.ladderTele>0 ? Math.sin(Date.now()/28)*2.2 : 0;
  const bx=(b.x+wob)|0, by=(b.y-hop)|0;
  // v0.9 (E-073/M2, Lena §6): Tell für schnelle Fässer (spd>=1.3) — Speed-Lines hinter dem Fass
  if(b.onGround && b.holdT<=0 && BARREL_TYPES[b.type].spd>=1.3){
    const sldir=b.vx>0?-1:1;
    cx.fillStyle='rgba(255,255,255,0.35)';
    cx.fillRect(bx+(sldir<0?b.w+3:-9), by+5, 6, 2);
    cx.fillRect(bx+(sldir<0?b.w+5:-11), by+13, 6, 2);
  }
  // b.frame läuft bereits 0..7 (updateBarrels) → Sheet IST die Rollanimation, keine Rotation nötig.
  // Fass-Test 2026-07-05: 3/4-Rollfass ist richtungsabhaengig -> nach Fahrtrichtung spiegeln (Weg A, revertierbar)
  { if(Math.abs(b.vx)>12) b._face=b.vx<0; const flip=b._face===true, yoff=(b.platIdx===0?3:6); cx.save(); if(flip){ cx.translate(bx+b.w,0); cx.scale(-1,1); } // _face latcht Richtung (kein L/R-Flackern); yoff: Boden 3, Traeger 6 (Balken sitzt tiefer im Tile) — Holger 2026-07-05
    const drawn=drawSheet('barrel-'+b.type+'-sheet', b.frame, 8, flip?0:bx, by+yoff, b.w, b.h);
    cx.restore();
    if(drawn){ drawBarrelLetter(b,bx,by); return; } } // E-088
  // Fallback (prozedural) — bleibt als Sicherheitsnetz
  const t=BARREL_TYPES[b.type];
  const r=b.w/2;
  cx.fillStyle=t.color;
  cx.beginPath();cx.ellipse(bx+r,by+r*0.88,r,r*0.78,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(255,255,255,0.3)';
  cx.beginPath();cx.ellipse(bx+r,by+r*0.88,r-3,(r-3)*0.7,b.frame*Math.PI/4,0,Math.PI*2);cx.fill();
  cx.strokeStyle='rgba(0,0,0,0.4)';cx.lineWidth=2;
  cx.beginPath();cx.moveTo(bx+3,by+r);cx.lineTo(bx+b.w-3,by+r);cx.stroke();
  cx.fillStyle=C.wht;cx.font='5px "Press Start 2P"';cx.textAlign='center';
  cx.fillText(t.label,bx+r,by+r*0.88+2);
}

// --- Spieler ---
function drawPlayer(){
  if(P.dead&&Math.floor(P.deathTimer*10)%2===0) return;
  const px=P.x|0, py=P.y|0;

  // Sprite auswählen: Walk-Animation wenn läuft, sonst Idle
  const isWalking = P.onGround && Math.abs(P.vx) > 10;
  const walkFrame = (Math.floor(Date.now()/120)%4)+1; // 4 Frames @ ~120ms
  const sprKey = isWalking ? 'player-walk-'+walkFrame : 'player-idle';
  const spr = SPRITES[sprKey] || SPRITES['player-idle'];

  if(spr){
    cx.save();
    // Spiegeln wenn links
    if(P.vx<0){ cx.translate(px+P.w,0); cx.scale(-1,1); }
    else       { cx.translate(px,0); }
    cx.drawImage(spr, 0, py, P.w, P.h+4);
    cx.restore();
    if(hitFlash>0.4){
      cx.save();
      cx.globalAlpha=0.5;cx.fillStyle=C.red;
      cx.fillRect(px,py,P.w,P.h+4);
      cx.restore();
    }
  } else {
    // Fallback Canvas
    const col=hitFlash>0.4?C.red:null;
    cx.fillStyle=col||C.purp; cx.fillRect(px+3,py,P.w-6,5);
    cx.fillStyle=col||C.skin; cx.fillRect(px+3,py+4,P.w-6,8);
    cx.fillStyle=col||C.red;  cx.fillRect(px+1,py+10,P.w-2,P.h-10);
    cx.fillStyle=C.yel;cx.font='bold 9px "Press Start 2P"';cx.textAlign='center';
    cx.fillText('5',px+P.w/2,py+P.h-2);
    const la=P.climbing||P.vx===0?0:Math.sin(P.frame*1.5)*3;
    cx.fillStyle=col||C.dbl;
    cx.fillRect(px+2,py+P.h,7,6+la);
    cx.fillRect(px+P.w-9,py+P.h,7,6-la);
  }
}

  // Gebäude-Vergleich (neue Signatur: bx,by,stage,W,H,ghost)
  if(buildLoops>0||HS_LOOPS>0){
    cx.fillStyle='rgba(0,0,0,0.4)';cx.fillRect(80,305,240,70);
    drawBuildingShape(110,310,Math.min(buildLoops,5),48,52,false);
    if(HS_LOOPS>0){
      cx.globalAlpha=0.35;
      drawBuildingShape(220,310,Math.min(HS_LOOPS,5),48,52,true);
      cx.globalAlpha=1;
    }
    cx.fillStyle=C.yel;cx.font='8px "Press Start 2P"';cx.textAlign='center';
    cx.fillText('DEIN RUN',134,378);
    if(HS_LOOPS>0){cx.fillStyle=C.blul;cx.fillText('BEST',244,378);}
  }
  if(DEV_BUILD){ // v0.11.27: GLOBAL-EINREICHEN-Platzhalter nur im Dev-Build zeigen — im öffentlichen Embed (DEV_BUILD=false) weg. Highscore ist Sprint 2, der „Button" ist reiner gezeichneter Text ohne Klick. textAlign=center steht schon ab Z.1514, TIPPEN/SHB-Box unten bleiben zentriert.
    cx.strokeStyle=C.blu;cx.lineWidth=2;
    cx.strokeRect(40,392,GW-80,44);
    cx.fillStyle=C.blu;cx.font='8px "Press Start 2P"';cx.textAlign='center';
    cx.fillText('GLOBAL EINREICHEN',GW/2,412);
    cx.fillStyle='rgba(255,255,255,0.35)';cx.font='8px "Press Start 2P"';
    cx.fillText('kommt in Sprint 2',GW/2,428);
  }
  if(Date.now()%900<500){
    cx.fillStyle=C.wht;cx.font='9px "Press Start 2P"';
    cx.fillText('TIPPEN = NOCHMAL',GW/2,470);
  }
  // E-120b (C, Lena): SHB-Gold-Box hoch auf ~452 — direkt unter „GLOBAL EINREICHEN" (Box-bottom 436),
  // klemmt zwischen dessen Unterkante und „TIPPEN = NOCHMAL" (y=470); Box 437..459 lässt oben/unten je ~1–2px Luft.
  drawShbLinkBox(452); // Fund #6: gemeinsamer Helper (enge C-Platzierung s. Kommentar drueber; Hit-Test shbPad bleibt getrennt)
}

// --- Win-Animation ---
function drawWin(){
  const age=1.8-winAnim;
  const alpha=Math.min(1,age*1.6);
  cx.fillStyle=`rgba(13,13,46,${alpha*0.92})`;cx.fillRect(0,0,GW,GH); // v0.11.5 (E-100/Lena D-Nachtrag #2): 0.85→0.92 — Welt (2. Gorillaman, Fass-Rand) konkurrierte mit der Feier-Figur
  if(alpha<0.3) return;
  // v0.11.5 (E-100/Lena D2): Win-Screen als EINE Karte statt drei Inseln — Leistung oben (groesstes Element)
  // → Wachstum direkt darunter → Vorschau als kompakter Fuss → Countdown fluestert ganz unten.
  // --- Sieg-Figur: der Businessman feiert mit (Gegner wird Kollege), 8-Frame-Jubel — raus aus der HUD-Zone (hy 2→40) ---
  { const hf=Math.min(7,Math.floor(age/0.12));
    const hh=86, hw=Math.round(hh*93/100), hx=GW/2-hw/2, hy=40;
    drawSheet('win-hero', hf, 8, hx, hy, hw, hh); }
  // --- Leistung (groesstes Text-Element des Screens, Lena-Hierarchieregel) ---
  cx.textAlign='center';
  const featureDoneNow=(act===2); // LIVE geschafft = Feature komplett
  cx.fillStyle=C.yel;cx.font='11px "Press Start 2P"';
  cx.fillText(featureDoneNow?('FEATURE '+(featsIntoApp+1)+' FERTIG! ★'):(ACT_GOAL[act]+' FERTIG! ★'),GW/2,142);
  cx.fillStyle=C.wht;cx.font='8px "Press Start 2P"';
  cx.fillText('+'+winBonus+' PUNKTE',GW/2,162);

  // Trennlinie
  cx.strokeStyle='rgba(74,159,212,0.5)';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(40,174);cx.lineTo(GW-40,174);cx.stroke();

  // --- Wachstum: App-Reward direkt unter der Leistung (E-099-Kopplung an die aktuelle App bleibt) ---
  const appStage = Math.min(MAX_STAGE, 1 + Math.round((MAX_STAGE-1) * (featsIntoApp + (featureDoneNow?1:0)) / Math.max(1,appFeatsNeeded())));
  const aw=104, ah=91, ax=GW/2-aw/2, ay=184;
  if(SPRITES['app-'+appStage]) cx.drawImage(SPRITES['app-'+appStage], ax, ay, aw, ah);
  else drawBuildingShape(ax, ay, appStage, aw, ah, false); // v0.4.1 (CC#7): Canvas-Fallback
  cx.fillStyle=C.blu;cx.font='8px "Press Start 2P"';cx.textAlign='center';
  cx.fillText('APP '+(appsShipped+1)+' · FEATURES '+(featsIntoApp+(featureDoneNow?1:0))+'/'+appFeatsNeeded(), GW/2, ay+ah+16); // v0.11.6 (E-104): featsIntoApp zaehlt erst in advance() hoch (nach diesem Screen) - Korrektur zeigt den grade verdienten Stand

  // --- Vorschau als kompakter Fuss (kleiner als die Leistung, Lena-Hierarchieregel) ---
  const nextAct=(act+1)%3;
  const appDoneNow=featureDoneNow && (featsIntoApp+1)>=appFeatsNeeded();
  const footY=ay+ah+34;
  cx.fillStyle=C.blu;cx.font='7px "Press Start 2P"';
  cx.fillText(appDoneNow?'APP RELEASED — NEUE APP:':(featureDoneNow?'NÄCHSTES FEATURE:':'NÄCHSTE STUFE:'),GW/2,footY);
  cx.fillStyle=C.yel;cx.font='8px "Press Start 2P"';
  cx.fillText(appDoneNow?'FEATURE 1':(featureDoneNow?'FEATURE '+(featsIntoApp+2):ACT_GOAL[nextAct]),GW/2,footY+16);

  // Neue Barrel-Vorschau — Schreibweise wie im Startschirm (Letter davor · Fass · voller Name · Punkte), kompakt
  const newTypes = ACT_NEW[nextAct];
  cx.fillStyle='rgba(255,255,255,0.5)';cx.font='7px "Press Start 2P"';
  cx.fillText(nextAct===0?'Fässer:':'Neu dabei:', GW/2, footY+30);
  newTypes.forEach((k,i)=>{
    const t=BARREL_TYPES[k]; const ry=footY+40+i*20;
    drawBarrelBig(k,GW/2-80,ry,30,15); // v0.11.6 (E-104): Buchstabe zentriert mitskaliert
    cx.fillStyle=t.color;cx.font='7px "Press Start 2P"';cx.textAlign='left';
    cx.fillText(NAME_FULL[k]||t.label,GW/2-38,ry+11);
    cx.fillStyle='rgba(255,255,255,0.5)';cx.textAlign='right';
    cx.fillText(t.pts+'pt',GW/2+80,ry+11);
    cx.textAlign='center';
  });
  cx.textAlign='center';

  // --- Countdown fluestert: duenn, ganz unten, gedaempfte Farbe (kein sattes Vollgelb mehr) ---
  const prog = winAnim/1.8;
  cx.fillStyle='rgba(255,255,255,0.12)';cx.fillRect(80,540,GW-160,3);
  cx.fillStyle='rgba(245,196,0,0.45)';cx.fillRect(80,540,Math.round((GW-160)*(1-prog)),3);
}

// --- Loop ---
let lastT=0;
// v0.11.25 (Holger): Touch-Steuerung nur im laufenden Spiel zeigen — im Menü/Game-Over/Win stört sie
// (Start läuft über den Canvas-Tap, nicht über die Buttons). Guard vermeidet DOM-Writes pro Frame.
let _ctrlShown=false;
function syncCtrlVis(){
  if(!isTouch) return;
  const show = (state==='play');
  if(show!==_ctrlShown){ ctrl.style.display = show?'block':'none'; _ctrlShown=show; }
}
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,0.05); lastT=ts;
  syncCtrlVis(); // v0.11.25: Steuerung an Spielzustand koppeln
  if(state==='play'){
    if(buildTutTimer>0 || demoOpen){ // v0.11.3 (CC-Review #1): Popup hält die WELT an — kein Spawn, keine Kollision, kein Tod hinterm Overlay; v0.11.13: Vorfuehr-Tafel ebenso
      if(!DEV_BUILD) buildTutTimer-=dt;
    } else {
    updatePlayer(dt);
    updateBarrels(dt);
    // v0.4.1 (CC#5): Render-Timer dt-basiert (120-Hz-stabil)
    if(hitFlash>0) hitFlash=Math.max(0,hitFlash-dt*3.6);
    if(shake>0) shake=Math.max(0,shake-dt); // v0.10 (E-067)
    kongWobble+=dt*0.18;
    if(kongThrowT>0) kongThrowT=Math.max(0,kongThrowT-dt);
    for(const f of floaters){f.life-=dt;f.y-=38*dt;}
    floaters=floaters.filter(f=>f.life>0);
    } // Ende Welt-Freeze (v0.11.3, CC-Review #1); DEV-Klick-Verhalten (E-098) unverändert — Timer läuft im Freeze-Zweig
    if(appDoneTimer>0) appDoneTimer-=dt; // v0.5-bc (A1): "APP FERTIG"-Moment ausblenden
  }
  if(state==='winanim'){
    if(DEV_BUILD){ winAnim=Math.max(0.02,winAnim-dt); } // v0.11.2 (Holger): DEV — Win-Screen bleibt bis Klick/Taste stehen
    else { winAnim-=dt; if(winAnim<=0) nextAct(); }
  }
  render();
  requestAnimationFrame(loop);
}

// --- Start ---
function startOrRestart(){
  if(state==='menu'){ initGame(); sfx('start'); }
  else if(state==='over'){ level=1; lives=3; initGame(); sfx('start'); }
}
window.addEventListener('keydown',e=>{
  if(e.code==='KeyM'){ toggleSound(); return; } // v0.10 (E-067): Mute-Toggle Desktop
  if(e.code==='KeyB'){ barrelLetters=!barrelLetters; return; } // v0.10.3 (E-088): Fass-Letter an/aus
  if(DEV_BUILD&&e.code==='KeyD'){ demoOpen=!demoOpen; return; } // v0.11.13: Vorfuehr-Modus auf/zu (Desktop)
  if(demoOpen){ if(e.code==='Escape') demoOpen=false; return; } // v0.11.13: Tafel offen → Tasten schlucken (kein verstecktes Start/Restart)
  if(state==='play'&&buildTutTimer>0&&(e.code==='Space'||e.code==='Enter')){ buildTutTimer=0; spawnFreeze=Math.min(spawnFreeze,0.8); return; } // v0.11.1: Popup auch per Taste schließbar
  if(state==='winanim'&&DEV_BUILD&&(e.code==='Space'||e.code==='Enter')){ nextAct(); return; } // v0.11.2: DEV — Win-Screen per Taste weiter
  if(e.code==='Space'||e.code==='Enter') startOrRestart();
});
cv.addEventListener('pointerdown',e=>{ // v0.10 (E-067): erst Sound-Button-Hit-Test (±8px Touch-Puffer), dann Start
  const r=cv.getBoundingClientRect();
  const gx=(e.clientX-r.left)/r.width*GW, gy=(e.clientY-r.top)/r.height*GH;
  if(gx>=SND_BOX.x-8&&gx<=SND_BOX.x+SND_BOX.w+8&&gy>=SND_BOX.y-8&&gy<=SND_BOX.y+SND_BOX.h+8){ toggleSound(); return; }
  // E-120: SHB-Link-Tap (nur auf Start-/Game-Over-Screen, SHB_BOX trägt die y des sichtbaren Screens)
  // E-120b-Fix (Review-Fund #1): Game-Over-Screen ist eng gepackt (GLOBAL-EINREICHEN-Box endet y436, SHB-Box 437..459,
  // TIPPEN y470) — dort KEIN Touch-Puffer, sonst fing der ±6-Puffer Neustart-Fehltipps am Boxrand ab und öffnete die
  // SHB-URL statt Neustart (bestätigt y433/y463). Auf dem Menü (Platz genug) bleibt ±6 wie SND_BOX.
  const shbPad=(state==='over')?0:6;
  if((state==='menu'||state==='over') && gx>=SHB_BOX.x&&gx<=SHB_BOX.x+SHB_BOX.w && gy>=SHB_BOX.y-shbPad&&gy<=SHB_BOX.y+SHB_BOX.h+shbPad){
    window.open(SHB_LINK,'_blank','noopener'); return; // Menü ±6 wie SND_BOX / Game-Over 0; return = kein Spielstart
  }
  // v0.11.13 (Vorfuehr-Modus, nur DEV): erst Tafel-Zeilen, dann DEMO-Button — vor allen Start-/Weiter-Handlern
  if(DEV_BUILD){
    if(demoOpen){
      for(const rw of DEMO_ROWS){ if(gx>=rw.x&&gx<=rw.x+rw.w&&gy>=rw.y&&gy<=rw.y+rw.h){
        if(rw.n===0){ level=1; lives=3; initGame(); demoOpen=false; sfx('start'); } // v0.11.15: STANDARD = normaler Run (demoRun=false via initGame, Rekorde zaehlen)
        else startDemoRun(rw.n);
        return;
      } }
      demoOpen=false; return; // Tipp ausserhalb der Zeilen = schliessen (und NICHT starten/weiterschalten)
    }
    if(gx>=DEMO_BOX.x-6&&gx<=DEMO_BOX.x+DEMO_BOX.w+6&&gy>=DEMO_BOX.y-6&&gy<=DEMO_BOX.y+DEMO_BOX.h+6){ demoOpen=true; return; }
  }
  if(state==='play'&&buildTutTimer>0){ buildTutTimer=0; spawnFreeze=Math.min(spawnFreeze,0.8); return; } // v0.11.1: Popup per Tipp schließbar (Holger), kurzer Rest-Freeze fürs Banner
  if(state==='winanim'&&DEV_BUILD){ nextAct(); return; } // v0.11.2: DEV — Win-Screen per Tipp weiter
  startOrRestart();
});
// v0.4.1 (CC#2): JUMP-Button startet/neustartet auch per Touch
document.getElementById('bJ').addEventListener('pointerdown',()=>{ if(state!=='play'&&!demoOpen) startOrRestart(); }); // v0.11.13: nicht hinter der Vorfuehr-Tafel starten

requestAnimationFrame(loop);
</script>
