*{margin:0;padding:0;box-sizing:border-box}
body{

  pointer-events:all;user-select:none;
  -webkit-tap-highlight-color:transparent;cursor:pointer;
  touch-action:none;
}
.btn:active{background:rgba(74,159,212,.42)}

function resize() {
  // v0.4.4: Steuerung ueberlappt die tote Boden-Zone (~70px unter P0) → nur 54px reservieren, Handy-Feld groesser
  const reserve = isTouch ? 54 : 0;
  const ctrlH   = isTouch ? 124 : 0;
  const s = Math.min(window.innerWidth / GW, window.innerHeight / (GH + reserve));
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const r = s * dpr;
  cv.width  = Math.round(GW * r);
  cv.height = Math.round(GH * r);
  cx.setTransform(r, 0, 0, r, 0, 0); // Spiel-Koordinaten bleiben 400x560
  cx.imageSmoothingEnabled = false;
  cv.style.width  = (GW * s) + 'px';
  cv.style.height = (GH * s) + 'px';
  const wrap = document.getElementById('wrap');
  wrap.style.width  = (GW * s) + 'px';
  wrap.style.height = ((GH + reserve) * s) + 'px';
  ctrl.style.width  = GW + 'px';
  ctrl.style.height = ctrlH + 'px'; // volle Button-Hoehe, ragt nach oben in die Boden-Zone
  ctrl.style.transform = `scale(${s})`;
  ctrl.style.transformOrigin = 'bottom left';
  if (isTouch) ctrl.style.display = 'block';
}

// --- v0.9-bc (E-073/M1): Löcher — app-basiert generiert (KONZEPT v2 §2/H3, F-5) ---
// Regeln (F-5): nur P1–P3, nie unter Leitern (+28px Landepuffer), nie am Rand,
// >=90px Abstand zwischen Löchern, max 2 pro Ebene, Breite <= GAP_WMAX (< Sprungweite ~100px).
// Skalierung app-basiert (NICHT level-basiert wie im Vibe-Stand): App 1 lochfrei (F-3).
const GAPS=[];
const GAP_WMAX=60;   // harter Deckel (F-5), tunebar 36–60 (Holger: "ein Ticken kleiner")
const GAP_DROP_CHANCE=0.10; // v0.9.1 (E-074, Holger): Fass kippt mit 10% durchs Loch — erst ab App 3 (F-5c)
function gapCount(){ return Math.min(appsShipped, 6); } // v0.9.1 (E-074, Holger): +1 Loch pro App — App2: 1, App3: 2 … Deckel 6
function gapBaseW(){ return Math.min(56, 40+4*appsShipped); }                    // v0.9.1: flacher — 44 → 48 → 52 → 56 (±4 Jitter)
function generateGaps(){
  GAPS.length=0;
  const total=gapCount();
  const per={1:0,2:0,3:0};
  let guard=0;
  while(GAPS.length<total && guard++<300){
    const pi=1+Math.floor(Math.random()*3);
    if(per[pi]>=2) continue;                    // max 2 pro Ebene (F-5)
    const p=PLATS[pi];
    const w=Math.min(GAP_WMAX, gapBaseW()+Math.floor(Math.random()*9)-4);
    const x=p.x+22+Math.random()*(p.w-44-w);    // nie am Plattformrand
    let ok=true;
    for(const l of LADDERS){ if(x<l.x+LW+28 && x+w>l.x-28){ok=false;break;} }    // Leitern + Landepunkte frei
    if(ok) for(const g of GAPS){ if(g.plat===pi && x<g.x+g.w+90 && x+w>g.x-90){ok=false;break;} }
    if(!ok) continue;
    GAPS.push({plat:pi, x:Math.round(x), w:Math.round(w)});
    per[pi]++;
  }
}
function gapAt(pi,cxx){
  for(const g of GAPS) if(g.plat===pi && cxx>g.x && cxx<g.x+g.w) return g;
  return null;
}

let AC=null;
function ensureAC(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ AC=null; } } if(AC&&AC.state==='suspended') AC.resume(); return AC; }
function tone(f0,f1,dur,type,vol,at){ // Mini-Synth: ein Oszillator, Frequenz-Gleiter, Exp-Ausklang
  const ac=AC; if(!ac) return;
  const t=ac.currentTime+(at||0);
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type||'square'; o.frequency.setValueAtTime(f0,t);
  if(f1&&f1!==f0) o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol||0.06,t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(ac.destination);
  o.start(t); o.stop(t+dur+0.02);
}
function sfx(n){ // alle Pegel bewusst leise (Messe-Stand!)
  if(!soundOn||!ensureAC()) return;
  switch(n){
    case 'jump':    tone(240,470,0.09,'square',0.045); break;
    case 'plat':    tone(660,0,0.05,'sine',0.05); break;
    case 'bonus':   tone(660,0,0.05,'sine',0.055); tone(880,0,0.06,'sine',0.055,0.05); break;
    case 'death':   tone(320,55,0.32,'sawtooth',0.06); break;

    case 'win':     tone(392,0,0.11,'square',0.045); tone(523,0,0.11,'square',0.045,0.11); tone(659,0,0.2,'square',0.05,0.22); break;

    case 'stop':    tone(150,70,0.16,'square',0.055); break;
    case 'start':   tone(330,660,0.1,'square',0.045); break;
  }
}

  cx.strokeStyle='rgba(74,159,212,0.45)'; cx.lineWidth=1; cx.strokeRect(b.x+0.5,b.y+0.5,b.w-1,b.h-1); // E-086: Rahmen leiser
  cx.fillStyle=soundOn?C.yel:'rgba(255,255,255,0.5)';
  cx.fillRect(b.x+4,b.y+9,4,5); // Lautsprecher-Korpus
  cx.beginPath(); cx.moveTo(b.x+8,b.y+9); cx.lineTo(b.x+12,b.y+5); cx.lineTo(b.x+12,b.y+18); cx.lineTo(b.x+8,b.y+14); cx.closePath(); cx.fill();
  if(soundOn){
    cx.strokeStyle=C.yel; cx.lineWidth=1;
    cx.beginPath(); cx.arc(b.x+12,b.y+11.5,3.5,-0.9,0.9); cx.stroke();
    cx.beginPath(); cx.arc(b.x+12,b.y+11.5,6,-0.9,0.9); cx.stroke();
  } else {

    cx.beginPath(); cx.moveTo(b.x+14,b.y+6); cx.lineTo(b.x+19,b.y+17); cx.stroke();
  }
}

// --- Hilfsfunktionen ---
function addFloat(x,y,text){floaters.push({x,y,text,life:1.2});}

function actSpeed() {
  // v0.9.2 (E-075, Holger): Tempo hängt NUR an der App — innerhalb einer App konstant („Speed halten").
  // Rampe ~×1,15 pro App, Deckel App 5 (Max-Punkt E-074). Ersetzt Akt-Rampe (E-024) + Cycle-Multiplikator.
  const APP_SPEED=[80, 92, 106, 122, 140];
  return APP_SPEED[Math.min(appsShipped, APP_SPEED.length-1)];
}
function actSpawnI() {
  const base=[2.8,2.0,1.4][act];
  return Math.max(0.8, base / Math.pow(1.1, cycle));
}

function ladderAt(e){
  for(let i=0;i<LADDERS.length;i++){
    const l=LADDERS[i];
    if(e.x+e.w>l.x+2&&e.x<l.x+LW-2&&e.y+e.h>l.yt&&e.y<l.yb) return i;
  }
  return -1;
}

// --- Init ---
function initGame(){
  resetPlayer(); barrels=[];
  act=0; cycle=0; buildLoops=0;
  appsShipped=0; featsIntoApp=0; appDoneTimer=0; // v0.5-bc (A1): App-Fortschritt frisch
  score=0; scoreAcc=0; hitFlash=0; winAnim=0; floaters=[];
  spawnFreeze=1.5; spawnT=1.5; spawnI=actSpawnI();
  moveStarted=false; lastSpawn=null; pendingWave=0; wavePauseT=0; spawnStopped=false; // v0.8 (E-072): Zyklus/Welle frisch
  generateGaps(); // v0.9 (E-073/M1): frische Löcher pro Run (App 1 lochfrei)
  buildTutTimer=0; // v0.4.1 (CC#8): Tutorial-Popup nicht in frischen Run schleppen
  if(!buildTutShown){ buildTutTimer=7.0; buildTutShown=true; spawnFreeze=Math.max(spawnFreeze,buildTutTimer); } // v0.11.1: 4,0→7,0 s lesbar + per Tipp schließbar; Spawns solange einfrieren
  state='play';
}
function resetPlayer(){
  P.x=30;P.y=450;P.vx=0;P.vy=0; // P0=490, Player h=30 → start y=460
  P.onGround=false;P.climbing=false;
  P.dead=false;P.deathTimer=0;P.jumpLock=true;P.highestPlat=0; // jumpLock=true: kein Auto-Sprung wenn Space beim Start/Respawn gehalten wird
}
function nextAct(){
  // E-023: 3 Akte zyklisch
  act=(act+1)%3;
  if(act===0){ cycle++; buildLoops++;
    if(!buildTutShown){buildTutTimer=7.0;buildTutShown=true;} // v0.11.1: Tutorial einmal, 7 s, schließbar
  }
  level++; // bewusst ohne Anzeige (CC-Review #3): interner Score-Multiplikator (pts×level, winBonus, scoreAcc) — HUD-Zeile trägt seit E-095 App/Feature
  // v0.11.1 (E-097, Holger-Modell): 3 Stufen (PROTOTYP→BETA→LIVE) = 1 Feature; Features füllen die App (Rampe appFeatsNeeded)
  if(act===0){ featsIntoApp++;
    if(featsIntoApp >= appFeatsNeeded()){ appsShipped++; featsIntoApp=0; appDoneTimer=1.8; sfx('appdone'); }
  }
  resetPlayer(); barrels=[];
  spawnFreeze=1.2; spawnT=1.2; spawnI=actSpawnI(); // v0.5.3: kuerzere Pause -> keine leeren Akte
  moveStarted=false; lastSpawn=null; pendingWave=0; wavePauseT=0; spawnStopped=false; // v0.8 (E-072): Zyklus/Welle pro Akt neu
  generateGaps(); // v0.9 (E-073/M1): Löcher pro Akt neu würfeln (Anzahl/Breite per App-Staffel)
  hitFlash=0; winAnim=0; state='play';
}

// Stehend-Fass-Position (links vor Gorilla, auf P4)
const BARREL_STAGE = {x:272, y:PLATS[4].y-20}; // sitzt auf P4 (Fass-Höhe 20 seit E-081)
const WIN_BOX = {x:306, w:40}; // v0.9 (E-073/M3): MAN-Box des Gorillaman (kx=304) — Berührung gewinnt

  });

// --- Player Update ---
function updatePlayer(dt){
  if(P.dead){
    P.deathTimer-=dt;
    if(P.deathTimer<=0){
      lives--;
      if(lives<=0){
        state='over'; sfx('over');
        if(score>HS){ HS=score; try{localStorage.setItem('shb_bc_hs',HS);}catch(e){} }
        if(buildLoops>HS_LOOPS){ HS_LOOPS=buildLoops; try{localStorage.setItem('shb_bc_loops',HS_LOOPS);}catch(e){} }
        if(appsShipped>HS_APPS){ HS_APPS=appsShipped; try{localStorage.setItem('shb_bc_apps',HS_APPS);}catch(e){} } // v0.5-bc (A1)
      } else {
        resetPlayer(); barrels=[]; spawnFreeze=2; spawnT=2; hitFlash=0; spawnStopped=false; // M3: Zielgerade neu verdienen
      }
    }
    return;
  }
  const li=ladderAt(P);
  // Leiter nur vom Boden aus greifen — verhindert mid-air Leiter-Snap
  if(li>=0&&UP()&&!P.climbing&&P.onGround){P.climbing=true;P.vy=0;}
  if(!P.climbing&&DN()&&P.onGround){
    for(let i=0;i<LADDERS.length;i++){
      const l=LADDERS[i];
      if(P.x+P.w>l.x+2&&P.x<l.x+LW-2&&Math.abs(P.y+P.h-l.yt)<12){
        P.climbing=true;P.onGround=false;P.vy=0;
        P.y+=6; // Füße in Leiterkollisions-Zone schieben (war exakt auf l.yt)
        P.x=l.x+LW/2-P.w/2; // auf Leitermitte zentrieren
        break;
      }
    }
  }
  if(li<0) P.climbing=false;
  if(P.climbing){
    const l=LADDERS[li>=0?li:0];
    if(li>=0) P.x+=(l.x+LW/2-P.w/2-P.x)*0.25;
    P.vx=0; P.vy=UP()?-88:DN()?85:0;
  } else {
    P.vx=L()?-158:R()?158:0;
    P.vy+=900*dt;
    if(JP()&&P.onGround&&!P.jumpLock){P.vy=-285;P.onGround=false;P.jumpLock=true;sfx('jump');} // 285²/1800=45px — passt für 90px Abstand
    if(!JP()) P.jumpLock=false;
  }
  // v0.6-bc (E-066): sobald der Spieler losläuft, sofort das erste Fass — dann kontinuierlicher Zyklus
  if(!moveStarted && (L()||R()||UP()||DN())){ moveStarted=true; spawnFreeze=0; lastSpawn=null; }
  const prevY=P.y;
  P.x+=P.vx*dt; P.y+=P.vy*dt;
  P.x=Math.max(0,Math.min(GW-P.w,P.x));
  P.onGround=false;
  // Bug-Fix „endloser Sturz": am Leiter-Fuß sauber auf die Plattform absetzen (statt durchzufallen)
  if(P.climbing && P.vy>0){
    const cl=LADDERS[li>=0?li:0];
    if(cl && P.y+P.h>=cl.yb){ P.y=cl.yb-P.h; P.climbing=false; P.onGround=true; P.vy=0; }
  }
  if(!P.climbing&&P.vy>=0){
    for(let pi=0;pi<PLATS.length;pi++){
      const p=PLATS[pi];
      if(pi>0 && gapAt(pi, P.x+P.w/2)) continue; // v0.9 (M1): über einem Loch fängt nichts — Spieler fällt durch (P0/P4 nie gelocht, F-5)
      // P0 = solider Boden: fängt immer (kein Durchfallen ins Leere); obere Plattformen nur von oben
      const onX = P.x+P.w>p.x+6 && P.x<p.x+p.w-6;
      const catchY = P.y+P.h>=p.y && (pi===0 ? true : prevY+P.h<=p.y+3);
      if(onX&&catchY){
        P.y=p.y-P.h;P.vy=0;P.onGround=true;
        if(pi>0&&pi>P.highestPlat){
          P.highestPlat=pi;
          if(pi<4){const b=pi*200;score+=b;addFloat(P.x+P.w/2,P.y-8,'+'+b);sfx('plat');}
        }
        break;
      }
    }
  }
  // v0.9 (E-073/M3): Sieg = Berührung der MAN-Box des SHB-Kollegen (vereinheitlicht mit Vibe; E-072-Gate bleibt)
  if(state==='play' && P.onGround && P.highestPlat>=4 && P.x+P.w>=WIN_BOX.x && P.x<=WIN_BOX.x+WIN_BOX.w){
    winBonus=1000+level*200; score+=winBonus;
    // v0.11.5 (E-100/Lena D-Nachtrag #1): Floater hier entfernt — fror waehrend winanim
    // eingefroren bei voller Deckkraft ein (Lebensdauer laeuft nur im state==='play'-Zweig
    // herunter) und schimmerte als Geist-Text hinter der Win-Karten-Vorschau durch. Die
    // Win-Karte zeigt den Bonus bereits prominent als "+PUNKTE" — der Floater war redundant.
    // Alle Floater leeren (nicht nur den Bonus-Floater): jeder andere frische Floater
    // (z.B. Fass-/Plattform-Bonus kurz vor dem Sieg) fröre aus demselben Grund genauso
    // eingefroren als Geist-Text ein.
    floaters=[];
    sfx('win'); winAnim=1.8; state='winanim';
  }
  if(P.y>GH+60){P.x=30;P.y=470;P.vy=0;}
  P.frameT+=dt;
  if(P.frameT>0.13){P.frame=(P.frame+1)%4;P.frameT=0;}
  // Passiver Zeit-Score nur außerhalb der Spawn-Freeze (sonst Gratis-Punkte bei unverwundbarem Stillstand im Akt-Intro/Respawn)
  if(spawnFreeze<=0){
    scoreAcc+=dt*10*level;
    const pts=scoreAcc|0;
    if(pts>0){score+=pts;scoreAcc-=pts;}
  }
}

// --- Barrel Update ---
function updateBarrels(dt){
  // Spawn-Freeze (E-025)
  if(spawnFreeze>0){ spawnFreeze-=dt; return; }

  const MINGAP=Math.max(90, Math.round(actSpeed()*1.2)); // v0.11 (FT-2): Reaktionslücke 1,15→1,2 s (Fremdtester: Abstand am Handy fast nicht handhabbar), Floor 90 px
  // v0.11 (FT-2, Fremdtester): Wellen an der App statt am Akt — Start 3, +1 pro App, Deckel 5; dazwischen echte Atempause.
  const HARDCAP=8;                    // v0.11.2 (Holger-Bild: Nachschub stockte — Deckel 5 war mit Welle 3 sofort voll) 5→8, tunebar; Fairness trägt MINGAP
  const waveSize=Math.min(5, 3+appsShipped);  // App 1: 3, App 2: 4, ab App 3: 5 Fässer pro Welle (Tester-Vorschlag: „stetig steigerbar")
  const WAVE_PAUSE=0.5;               // v0.11.6 (E-104/Milo, Holger-Sichtcheck: >1 Etage leer): 1,0→0,5 s — Takt statt Vakuum; MINGAP bleibt Fairness-Boden. Range 0,4–0,6, Do-Playtest
  // v0.9.4 (E-077, Holger): Zielgerade erst auf P4 — Ankunft ganz oben stoppt den Nachschub, Stapel wird geräumt (E-076).
  // Der Sieg-Gang bleibt spannend: was schon rollt, rollt weiter. Banner erst, wenn der Schirm leer ist.
  const halted = !P.dead && P.y+P.h <= PLATS[4].y+4 && P.x+P.w/2 >= GW/2; // v0.9.6 (E-079, Holger): Stopp erst ab der Mitte von P4 („wo BETA steht")
  spawnHaltedNow = halted; // v0.9.2 (E-075): live fürs Rendering
  // v0.9.8 (E-081, Holger): NICHTS Sichtbares wird ausgeblendet — schon gespawnte Fässer (stehend/rollend) leben aus.
  // (E-076-Stapel-Räumung zurückgebaut: seit "Banner erst bei leerem Schirm" [E-077] lügt die Meldung nicht mehr.)
  if(halted && barrels.length===0 && !spawnStopped){ spawnStopped=true; addFloat(GW/2,175,'FÄSSER GESTOPPT!'); sfx('stop'); } // v0.9.4: Banner erst bei leerem Schirm — im selben Moment verschwindet der Vorrat (E-075)
  const topRowClear = !barrels.some(b => b.platIdx===4 && b.x > GW*0.45); // v0.9.8 (E-081, Holger): Welle 2 früher — P4 gilt als frei, sobald alle oben in der linken Hälfte sind (war: komplett leer)
  if(!halted && pendingWave===0 && barrels.length < HARDCAP){ // v0.11 (FT-2): Welle → Atempause → Welle. Pause endet frühestens WAVE_PAUSE s nach freier Top-Ebene.
    if(barrels.length===0){ pendingWave=waveSize; wavePauseT=0; }        // nie leer — sofort nachlegen
    else if(topRowClear){ wavePauseT+=dt; if(wavePauseT>=WAVE_PAUSE){ pendingWave=waveSize; wavePauseT=0; } }
    else wavePauseT=0;
  }
  if(!halted && pendingWave>0 && barrels.length < HARDCAP){
    // Welle Fass für Fass freigeben — aber nur wenn der Stapelplatz Mindestabstand frei ist
    const stageBusy = barrels.some(b => b.platIdx===4 && Math.abs(b.x-(BARREL_STAGE.x-28)) < MINGAP);
    if(!stageBusy){ spawnBarrel(); pendingWave--; }
  }

  for(let i=barrels.length-1;i>=0;i--){
    const b=barrels[i];
    // Halte-Phase: Fass steht kurz am Stapelplatz
    if(b.holdT>0){
      b.holdT-=dt;
      if(b.holdT<=0){ b.vx=-actSpeed()*BARREL_TYPES[b.type].spd; } // jetzt losrollen (v0.9/M2: Typ-Tempo)
      continue; // noch nicht physikupdaten
    }
    if(b.onGround){
      b.vy=0;
      const p=PLATS[b.platIdx];
      b.x+=b.vx*dt;
      // v0.9.1 (E-074, F-5c): Fass kippt mit 10% sichtbar durchs Loch (ab App 3) — einmal je Loch-Querung
      const gnow=gapAt(b.platIdx, b.x+b.w/2);
      if(gnow && b.lastGap!==gnow){
        b.lastGap=gnow;
        if(appsShipped>=2 && Math.random()<GAP_DROP_CHANCE){ b.onGround=false; b.vy=40; b.vx*=0.4; continue; }
      } else if(!gnow){ b.lastGap=null; }
      b.y=p.y-b.h; // Hüpfer ist rein visuell in drawBarrel (v0.9.6/E-079 — exakt wie Vibe v0.6.0)
      const offR=b.vx>0&&b.x+b.w>p.x+p.w+5;
      const offL=b.vx<0&&b.x<p.x-5;
      if(offR||offL){b.onGround=false;b.vy=15;b.vx=0;}
    } else {
      b.vy+=900*dt; b.x+=b.vx*dt; b.y+=b.vy*dt;
      if(b.vy>=0){
        for(let pi=0;pi<PLATS.length;pi++){
          const p=PLATS[pi];
          if(gapAt(pi, b.x+b.w/2)) continue; // v0.9 (M1): Fässer landen nicht IN einer Lücke (hüpfen drüber)
          const prevB=b.y+b.h-b.vy*dt;
          if(prevB<=p.y+3&&b.y+b.h>=p.y&&b.x+b.w>p.x+4&&b.x<p.x+p.w-4){
            b.y=p.y-b.h;b.vy=0;b.onGround=true;b.platIdx=pi;
            b.vx=PLATS[pi].dir*actSpeed()*BARREL_TYPES[b.type].spd; // v0.9/M2: Typ-Tempo
            break;
          }
        }
      }
    }
    if(b.y>GH+80||b.x<-80||b.x>GW+80){barrels.splice(i,1);continue;}

    // Kollision
    if(!P.dead&&b.x+b.w-7>P.x+3&&b.x+7<P.x+P.w-3&&b.y+b.h-4>P.y+5&&b.y+4<P.y+P.h-2){ // v0.4.2 (T-4): Trefferbox enger
      P.dead=true;P.deathTimer=0.9;hitFlash=0.7;shake=0.28;sfx('death');
      barrels.splice(i,1);continue;
    }

    // Typisierter Jump-Bonus (E-019)
    if(!b.jumpScored&&!P.dead&&!P.onGround&&!P.climbing){ // v0.4.2-fix: auch im Aufstieg zaehlen (Punkte zuverlaessig)
      const bCx=b.x+b.w/2, pCx=P.x+P.w/2;
      if(Math.abs(bCx-pCx)<40&&b.y>=P.y+P.h-8&&b.y<=P.y+P.h+50){ // v0.4.2 (CC#6): Band weit genug fuer echte Spruenge, blockt aber Ebene tiefer (~90px)
        b.jumpScored=true;
        const jp=BARREL_TYPES[b.type].pts*level;
        score+=jp;
        addFloat(P.x+P.w/2,P.y-12,'+'+jp+' '+BARREL_TYPES[b.type].label+'!');sfx('bonus');
      }
    }
    b.frameT+=dt;
    if(b.frameT>0.08){b.frame=(b.frame+1)%8;b.frameT=0;}
  }

  // v0.6.2 (E-069, Holger): Mindestabstand auf derselben Plattform erzwingen — sonst überlagern sich Fässer
  // (z. B. wenn eins von oben neben ein rollendes fällt) und werden unüberspringbar. Der in Rollrichtung
  // hintere wird zurückgeklemmt, bis die Lücke wieder da ist. Garantiert F-1 (überspringbar) auch im Kaskaden-Fall.
  // Kaskaden-Guard nutzt MINGAP von oben — Fässer gleicher Plattform ≥ MINGAP auseinander
  for(let i=0;i<barrels.length;i++){
    for(let j=i+1;j<barrels.length;j++){
      const a=barrels[i], b=barrels[j];
      if(a.platIdx!==b.platIdx || !a.onGround || !b.onGround || a.holdT>0 || b.holdT>0) continue;
      if(Math.abs(a.x-b.x) >= MINGAP) continue;
      const dir=PLATS[a.platIdx].dir;                 // Rollrichtung auf dieser Plattform
      if(dir>0){ if(a.x<b.x) a.x=b.x-MINGAP; else b.x=a.x-MINGAP; }   // nach rechts: hinten = kleineres x
      else     { if(a.x>b.x) a.x=b.x+MINGAP; else b.x=a.x+MINGAP; }   // nach links:  hinten = größeres x
      // v0.9 (E-073/M1, F-4): nie in eine Loch-Zone klemmen — den Zurückgeklemmten hinter den Loch-Rand schieben
      const back = dir>0 ? (a.x<b.x?a:b) : (a.x>b.x?a:b);
      const bg2 = gapAt(back.platIdx, back.x+back.w/2);
      if(bg2){ back.x = dir>0 ? bg2.x-back.w-2 : bg2.x+bg2.w+2; }
    }
  }
}

const STARS=[], BIGSTARS=[], BG_CITY=[];
{ let s=42; const rnd=()=>((s=(s*1103515245+12345)&0x7fffffff)/0x7fffffff);
  for(let i=0;i<44;i++) STARS.push({x:(rnd()*GW)|0, y:(rnd()*260)|0, a:0.08+rnd()*0.2, tw:(rnd()*11)|0});
  for(let i=0;i<5;i++) BIGSTARS.push({x:8+((rnd()*(GW-16))|0), y:44+((rnd()*160)|0), tw:(rnd()*7)|0}); // E-086: wenige helle Glint-Sterne
  let bx=-8;
  while(bx<GW+16){ const w=16+((rnd()*26)|0), h=24+((rnd()*56)|0);
    BG_CITY.push({x:bx, w, h, ant:rnd()<0.3}); bx+=w+3+((rnd()*12)|0); }
}
function drawBackdrop(){
  bgInitGrads();
  cx.fillStyle=BG_GRAD; cx.fillRect(0,0,GW,GH);
  const t=(Date.now()/700)|0;
  for(const st of STARS){ if((t+st.tw)%13===0) continue; // langsames, versetztes Funkeln
    cx.fillStyle='rgba(200,220,255,'+st.a+')'; cx.fillRect(st.x,st.y,1,1); } // 1 px = Punkte, keine Kacheln
  for(const bs of BIGSTARS){ if((t+bs.tw)%9>6) continue; // v0.10.2 (E-086): Glint-Sterne — 2 px + Kreuz-Schimmer, ruhig
    cx.fillStyle='rgba(210,230,255,0.30)'; cx.fillRect(bs.x,bs.y,2,2);
    cx.fillStyle='rgba(210,230,255,0.13)';
    cx.fillRect(bs.x-1,bs.y,1,2); cx.fillRect(bs.x+2,bs.y,1,2); cx.fillRect(bs.x,bs.y-1,2,1); cx.fillRect(bs.x,bs.y+2,2,1);
  }
  // v0.10.2 (E-086, Juno): Mond-Sichel — ruhiger Anker, bewusst zwischen App-Skyline (links) und Gorilla/Spawn (rechts)
  cx.fillStyle='rgba(205,220,245,0.20)'; cx.beginPath(); cx.arc(196,80,11,0,Math.PI*2); cx.fill();
  cx.fillStyle='#15153e'; cx.beginPath(); cx.arc(201,76,9,0,Math.PI*2); cx.fill();
  cx.fillStyle=BG_GLOW; cx.fillRect(0,414,GW,76);
  for(let i=0;i<BG_CITY.length;i++){ const b=BG_CITY[i];
    cx.fillStyle='rgba(9,9,30,0.9)'; cx.fillRect(b.x,490-b.h,b.w,b.h);            // Silhouette (dunkler als bg)
    if(b.ant) cx.fillRect(b.x+((b.w/2)|0),490-b.h-6,1,6);                          // Antenne bricht die Kastenkante
    cx.fillStyle='rgba(107,189,224,0.08)'; cx.fillRect(b.x,490-b.h,b.w,1);         // hauchdünne Dachkante
    cx.fillStyle='rgba(245,196,0,0.16)';                                            // spärliche Fenster, deterministisch
    for(let wy=490-b.h+5; wy<482; wy+=13){ if((i*7+wy)%4===0) cx.fillRect(b.x+2+((i*5+wy)%Math.max(3,b.w-5)),wy,2,2); }
  }
}

// --- RENDER ---
function render(){
  cx.imageSmoothingEnabled=false;
  drawBackdrop(); // v0.10.1 (E-085, Lena/Juno): Nachthimmel + ferne Skyline — ersetzt das Kästchen-Gitter
  cx.save(); if(shake>0) cx.translate((Math.random()*4-2)|0,(Math.random()*4-2)|0); // v0.10 (E-067): Death-Shake, ~0,28s, dezent
  // v0.9 (E-073/M5a): Ambient — Signal-Lichter im Himmel (A-3: der Schirm lebt immer, 0 Assets, R-046)
  const TWK=[[30,70],[105,58],[168,84],[236,64],[352,46],[86,100],[300,48],[210,102]];
  const tnow=Date.now()/500|0;
  for(let ti=0;ti<TWK.length;ti++){
    if((tnow+ti*5)%9<2){ cx.fillStyle='rgba(107,189,224,0.5)'; cx.fillRect(TWK[ti][0],TWK[ti][1],2,2); }
  }

  // Leitern — tile-ladder (6x16) vertikal gekachelt, auf LW=18 gestreckt
  for(const l of LADDERS){
    if(SPRITES['tile-ladder']){
      for(let ry=l.yt; ry<l.yb; ry+=16){
        const h=Math.min(16, l.yb-ry);
        cx.drawImage(SPRITES['tile-ladder'], 0,0,18,h, l.x, ry, LW, h); // Quelle beschneiden statt stauchen
      }
    } else {
      cx.fillStyle=C.blu;
      cx.fillRect(l.x,l.yt,3,l.yb-l.yt);
      cx.fillRect(l.x+LW-3,l.yt,3,l.yb-l.yt);
      cx.fillStyle=C.blul;
      for(let ry=l.yt+7;ry<l.yb;ry+=12) cx.fillRect(l.x+3,ry,LW-6,3);
    }
  }

  // Plattformen + Boden
  for(let pi=0;pi<PLATS.length;pi++){
    const p=PLATS[pi];
    if(pi===0 && SPRITES['tile-floor']){
      // v0.9.7 (E-080, Holger): Boden-Kisten kleiner (48→24), zwei Reihen bis y≈538 — die Steuer-Hinweis-Zeile (y552) bleibt frei lesbar
      for(let fy=p.y; fy<p.y+48; fy+=24)
        for(let fx=0; fx<GW; fx+=24)
          cx.drawImage(SPRITES['tile-floor'], fx, fy, 24, 24);
    } else if(SPRITES['tile-platform']){
      // Gerüst-Balken (32x16) horizontal gekachelt, Oberkante ~p.y
      for(let gx=p.x; gx<p.x+p.w; gx+=32){
        const gw=Math.min(32, p.x+p.w-gx);
        cx.drawImage(SPRITES['tile-platform'], 0, 0, gw, 16, gx, p.y-3, gw, 16);
      }
    } else {
      cx.fillStyle=pi===4?C.wht:C.yel;
      cx.fillRect(p.x,p.y,p.w,p.h);
      cx.fillStyle='rgba(0,0,0,0.18)';
      for(let gx=p.x+16;gx<p.x+p.w-6;gx+=18) cx.fillRect(gx,p.y,1,p.h);
    }
    // v0.9 (E-073/M1): Loch-Aussparung + sichtbare Bruchkanten (Lena §6 — in 2s als Loch lesbar)
    if(pi>=1&&pi<=3){
      for(const g of GAPS){ if(g.plat!==pi) continue;
        cx.fillStyle=C.bg; cx.fillRect(g.x, p.y-3, g.w, 16);
        cx.fillStyle=C.yel; cx.fillRect(g.x-2, p.y-3, 2, 13); cx.fillRect(g.x+g.w, p.y-3, 2, 13);
      }
    }
    // v0.11.5 (E-100/Lena D-Nachtrag 2): Label nur waehrend der Feature-Banner-Phase (spawnFreeze>0) —
    // seit D1 traegt die HUD-Projekt-Zeile die Info dauerhaft; im laufenden Spiel rollten Faesser durch den Text
    if(pi===4 && state!=='winanim' && spawnFreeze>0){
      cx.fillStyle=C.yel;cx.font='8px "Press Start 2P"';cx.textAlign='center';
      cx.fillText(ACT_GOAL[act],p.x+p.w/2,p.y-7);
    }
  }

  // v0.9.2 (E-075, Holger): Fass-Vorrat am Stapelplatz — „alle Fässer weg = Fass weg"
  // (macht den Spawn-Stopp in der Welt lesbar: Vorrat verschwindet, der Weg zum Kollegen ist frei)
  if(state!=='menu' && !spawnHaltedNow){ // v0.9.5 (E-078, Lena): Vorrat verschwindet bei P4-Ankunft — Quelle versiegt, Restfässer rollen aus
    // v0.9.3 (E-076, Holger-Bug 2): Vorrat steht HINTER dem Kollegen (x352, war x272 mitten im Sieg-Weg)
    if(SPRITES['barrel-stehend']) cx.drawImage(SPRITES['barrel-stehend'], 366, PLATS[4].y-28, 20, 28); // v0.9.9 (E-082): einen Ticken kleiner (24×33 → 20×28)
    else { cx.fillStyle=C.blu; cx.fillRect(366, PLATS[4].y-22, 15, 22); }
  }

  // Fässer
  for(const b of barrels) drawBarrel(b);

  // Spieler
  drawPlayer();

  // Floaters
  cx.textAlign='center';cx.font='8px "Press Start 2P"';
  for(const f of floaters){
    const a=Math.min(1,f.life*1.5);
    cx.globalAlpha=a;
    cx.fillStyle=f.text.includes('SCH')?C.yel:f.text.includes('!')?C.blul:C.yel;
    cx.fillText(f.text,f.x,f.y);
  }
  cx.globalAlpha=1;

  // HUD zuerst → Gorilla danach (damit Gorilla nicht vom HUD-Balken verdeckt wird)
  drawHUD();
  // v0.11.1 (Holger-Sichtcheck): Monitor-Icon oben rechts raus („wirkt nicht") — App-Fortschritt tragen HUD-Zeile + Skyline; Funktion in v0.11.3 gelöscht (CC-Review #6)
  drawKong();

  if(hitFlash>0){
    cx.fillStyle=`rgba(255,50,50,${hitFlash*0.3})`;
    cx.fillRect(0,0,GW,GH);
  }

  // Gebäude-Tutorial-Popup (nach erstem Loop)
  if(buildTutTimer>0){
    const fade=(DEV_BUILD&&buildTutTimer>=6.9)?1:Math.min(1,Math.min(buildTutTimer,7.0-buildTutTimer+0.3)/0.4); // v0.11.3 (CC-Review #4): im DEV-Freeze volle Deckkraft statt 75 %
    cx.globalAlpha=Math.max(0,fade);
    // v0.4.3: Vollbild-Abdunkler -> Plattformen/Labels treten zurueck, kein Kanten-Clash
    cx.fillStyle='rgba(13,13,46,0.82)'; cx.fillRect(0,0,GW,GH);
    const px=30,py=GH/2-95,pw=GW-60,ph=188; // v0.11.1: Panel höher — Konzept-Zeilen + Monitor-Reihe entzerrt
    cx.fillStyle='rgba(10,10,40,0.98)'; cx.fillRect(px,py,pw,ph);
    cx.strokeStyle=C.yel;cx.lineWidth=2; cx.strokeRect(px,py,pw,ph);

    cx.textAlign='center';
    cx.fillStyle=C.yel;cx.font='9px "Press Start 2P"';
    cx.fillText('SO ENTSTEHT DEINE APP:',GW/2,py+20); // v0.11.1 (E-097): Konzept sichtbar erklärt (Holger)
    cx.fillStyle='rgba(255,255,255,0.85)';cx.font='8px "Press Start 2P"';
    cx.fillText('PROTOTYP → BETA → LIVE',GW/2,py+38);
    cx.fillText('= 1 FEATURE',GW/2,py+50);

    // 5 Stufen nebeneinander visualisieren
    const stages=[1,2,3,4,5];
    const sw=40,sh=44,sgap=8;
    const stot=stages.length*(sw+sgap)-sgap;
    let sx=GW/2-stot/2;
    stages.forEach(s=>{
      drawBuildingShape(sx,py+58,s,sw,sh,false);
      // Stufen-Label
      cx.fillStyle=s===buildLoops?C.yel:'rgba(255,255,255,0.4)';
      cx.font='8px "Press Start 2P"';cx.textAlign='center';
      cx.fillText(s,sx+sw/2,py+112);
      if(s===buildLoops){
        cx.fillStyle=C.yel;cx.font='8px "Press Start 2P"';
        cx.fillText('DU',sx+sw/2,py+124);
      }
      sx+=sw+sgap;
    });

    cx.fillStyle='rgba(255,255,255,0.7)';cx.font='8px "Press Start 2P"';cx.textAlign='center';
    cx.fillText('PRO FEATURE WÄCHST DIE APP',GW/2,py+142); // v0.11.1 (E-097)
    cx.fillStyle=C.blu;cx.font='8px "Press Start 2P"';
    cx.fillText('TIPPEN = LOS GEHTS!',GW/2,py+160);

    // Fortschrittsbalken
    const prog=buildTutTimer/7.0; // v0.11.1: länger lesbar
    cx.fillStyle='rgba(255,255,255,0.15)';cx.fillRect(px+16,py+ph-12,pw-32,6);
    cx.fillStyle=C.yel;cx.fillRect(px+16,py+ph-12,Math.round((pw-32)*prog),6);
    cx.globalAlpha=1;
  }

  // Akt-Intro Banner während Spawn-Freeze (nicht während des Tutorials -> kein Ueberblenden, v0.4.3)
  if(state==='play' && spawnFreeze>0 && buildTutTimer<=0){
    const fadeIn=Math.min(1,(2.5-spawnFreeze)/0.3);
    const fadeOut=spawnFreeze<0.5?spawnFreeze/0.5:1;
    const a=Math.min(fadeIn,fadeOut);
    cx.globalAlpha=a;
    cx.fillStyle='rgba(13,13,46,0.85)';cx.fillRect(20,GH/2-54,GW-40,100);
    cx.strokeStyle=C.blu;cx.lineWidth=2;cx.strokeRect(20,GH/2-54,GW-40,100);
    cx.textAlign='center';
    cx.fillStyle=C.yel;cx.font='10px "Press Start 2P"';
    cx.fillText('FEATURE '+(featsIntoApp+1)+' — '+ACT_GOAL[act],GW/2,GH/2-28); // v0.11.1 (E-097): Feature + Stufe (PROTOTYP/BETA/LIVE)
    cx.fillStyle=C.wht;cx.font='8px "Press Start 2P"';
    cx.fillText(ACT_DESC[act],GW/2,GH/2-6);
    // Barrel-Icons — v0.11.2 (Holger): Letter VOR dem Fass, wie im Startschirm
    const types=ACT_TYPES[act];
    const bw=28,bg=10,lw=14,tot=types.length*(lw+bw+bg)-bg;
    let bxi=GW/2-tot/2;
    types.forEach(k=>{
      drawBarrelBig(k,bxi,GH/2+8,bw+lw,20); // v0.11.6 (E-104): ein grosses Fass statt Letter+Fass nebeneinander
      bxi+=lw+bw+bg;
    });
    cx.globalAlpha=1;
  }

  // v0.5.2 (E-063, Holger): Steuer-Hinweis am unteren Rand — Sicherheitsnetz, falls die Startseite uebersprungen wurde
  if(state==='play' && !isTouch){
    cx.textAlign='center'; cx.font='6px "Press Start 2P"';
    cx.fillStyle='rgba(0,0,0,0.55)'; cx.fillText('← →  LAUFEN    ↑  LEITER    SPACE  SPRINGEN', GW/2, 553);
    cx.fillStyle='rgba(255,255,255,0.62)'; cx.fillText('← →  LAUFEN    ↑  LEITER    SPACE  SPRINGEN', GW/2, 552);
  }

  if(state==='menu')    drawMenu();
  if(state==='over')    drawOver();
  if(state==='winanim') drawWin();

  cx.restore(); // Shake-Ende (E-067)
  drawSndBtn(); // v0.10 (E-067): Mute-Toggle — Mute-by-default (Kundentag-Auflage)

  // v0.9.7 (E-080, Holger): Dev-Versionsanzeige — nur während der Entwicklung (DEV_BUILD=false vorm Kundentag)
  if(DEV_BUILD){
    cx.textAlign='left'; cx.font='6px "Press Start 2P"';
    cx.fillStyle='rgba(255,255,255,0.45)'; cx.fillText(VERSION, 6, 78);
  }
}

// --- Gorilla (E-029: Zappel + Push) ---
function drawKong(){
  // Sprite-Box 109x123 (native), Fußlinie bei y=121. Verhältnis-treu skaliert (kein Stauchen).
  const BW=109, BH=123, FEET=121;
  const KH=76, KW=Math.round(KH*BW/BH), sc=KH/BH;
  const kx=304;                                   // Bein-Anker ~ alte Gorilla-Position
  const ky=PLATS[4].y - Math.round(FEET*sc) + 2;  // Füße auf P4
  // Idle steht ruhig (kein Fass!), leichtes Wobble; während des Wurfs kein Wobble
  const wobbleX = kongThrowT>0 ? 0 : Math.sin(kongWobble*80)*1.2;

  // --- Wurf: Fass NUR beim Werfen, in der Farbe des gespawnten Typs (langsame 3-Frame-Sequenz) ---
  if(kongThrowT>0){
    const sh=SPRITES['gorilla-throw-'+kongThrowType];
    if(sh){
      const p = 1 - (kongThrowT/KONG_THROW_DUR);          // 0..1
      const fi = p<0.45 ? 0 : p<0.72 ? 1 : p<0.92 ? 2 : -1; // halten → winden → runter → Release(=Idle)
      if(fi>=0){
        cx.drawImage(sh, fi*BW,0,BW,BH, kx+wobbleX,ky, KW,KH);
        // v0.11.6 (T2, Holger: "nehmt das alte Bild, sieht besser aus als der Farbklecks") — Layover-Patch (E-105/R2) wieder raus,
        // originales Wurf-Sprite mit dem eingebrannten Buchstaben bleibt unangetastet.
        return;
      }
    }
  }
  // --- Idle (kein Fass) ---
  if(SPRITES['gorilla-idle']){
    cx.drawImage(SPRITES['gorilla-idle'], kx+wobbleX,ky, KW,KH);
    return;
  }
  // Fallback Canvas-Gorilla (falls PNGs fehlen)
  const ox=kx+wobbleX, oy=ky+Math.round(FEET*sc)-40;
  cx.fillStyle='#2a1a5e';
  cx.fillRect(ox,oy,28,34); cx.fillRect(ox+2,oy-10,24,14);
  cx.fillRect(ox-6,oy+4,8,18); cx.fillRect(ox+26,oy+4,8,18);
  cx.fillStyle=C.yel; cx.fillRect(ox+12,oy+16,4,12);
}

// --- Sprite-Sheet-Helper (Integration 2026-06-28): zeichnet Frame f aus horizontalem Sheet ---
function drawSheet(key, frame, frames, dx, dy, dw, dh){
  const img=SPRITES[key];
  if(!img) return false;
  const fw=img.width/frames, fh=img.height;
  cx.drawImage(img, (((frame%frames)+frames)%frames)*fw, 0, fw, fh, dx, dy, dw, dh);
  return true;
}
// v0.11.6 (E-104/Lena, R1-Rework E-105: Holger „ich hoffe das sind unsere Original-Fässer" — die gemalte Ellipse
// wirkte als Pille statt Fass): grosses Fass für Popups/Banner — echtes Sprite in Zielgroesse statt Neu-Malen,
// Buchstabe zentriert mitskaliert oben drauf (E-088-Overlay-Logik).
function drawBarrelBig(type, dx, dy, dw, dh){
  const t=BARREL_TYPES[type];
  if(!drawSheet('barrel-'+type+'-sheet', 0, 8, dx, dy, dw, dh)){
    cx.fillStyle=t.color; cx.fillRect(dx,dy,dw,dh); // Fallback falls Sheet fehlt
  }
  if(barrelLetters){
    const ch=type[0].toUpperCase();
    const fs=Math.max(8,Math.round(dh*0.55)); // v0.11.6 (T1, Holger: "ein wenig kleiner"): 0,7→0,55 — E-050-Floor 8px bleibt Untergrenze
    cx.textAlign='center'; cx.font=fs+'px "Press Start 2P"';
    cx.fillStyle='rgba(0,0,0,0.75)'; cx.fillText(ch, dx+dw/2+1, dy+dh/2+fs*0.55+1); // v0.11.6 (T1, Holger: "und tiefer"): 0,35→0,55
    cx.fillStyle='#ffffff';          cx.fillText(ch, dx+dw/2,   dy+dh/2+fs*0.55);
  }
}

// --- Barrel zeichnen — 8-Frame-Roll-Sheet (39x30), Badge eingebrannt ---
function drawBarrel(b){
  // v0.9.6 (E-079): Hüpfer 1:1 aus der Vibe-Version (v0.6.0) — leichter Anstieg, dann Abstieg; rein visuell
  let hop=0;
  if(b.onGround){
    const g=gapAt(b.platIdx, b.x+b.w/2);
    if(g){ const gt=Math.max(0,Math.min(1,(b.x+b.w/2-g.x)/g.w)); hop=Math.sin(Math.PI*gt)*12; }
  }
  const bx=b.x|0, by=(b.y-hop)|0;
  // v0.9 (E-073/M2, Lena §6): Tell für schnelle Fässer (spd>=1.3) — Speed-Lines hinter dem Fass
  if(b.onGround && b.holdT<=0 && BARREL_TYPES[b.type].spd>=1.3){
    const sldir=b.vx>0?-1:1;
    cx.fillStyle='rgba(255,255,255,0.35)';
    cx.fillRect(bx+(sldir<0?b.w+3:-9), by+5, 6, 2);
    cx.fillRect(bx+(sldir<0?b.w+5:-11), by+13, 6, 2);
  }
  // b.frame läuft bereits 0..7 (updateBarrels) → Sheet IST die Rollanimation, keine Rotation nötig.
  if(drawSheet('barrel-'+b.type+'-sheet', b.frame, 8, bx, by, b.w, b.h)){ drawBarrelLetter(b,bx,by); return; } // E-088
  // Fallback (prozedural) — bleibt als Sicherheitsnetz
  const t=BARREL_TYPES[b.type];
  const r=b.w/2;
  cx.fillStyle=t.color;
  cx.beginPath();cx.ellipse(bx+r,by+r*0.88,r,r*0.78,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(255,255,255,0.3)';
  cx.beginPath();cx.ellipse(bx+r,by+r*0.88,r-3,(r-3)*0.7,b.frame*Math.PI/4,0,Math.PI*2);cx.fill();
  cx.strokeStyle='rgba(0,0,0,0.4)';cx.lineWidth=2;
  cx.beginPath();cx.moveTo(bx+3,by+r);cx.lineTo(bx+b.w-3,by+r);cx.stroke();
  cx.fillStyle=C.wht;cx.font='5px "Press Start 2P"';cx.textAlign='center';
  cx.fillText(t.label,bx+r,by+r*0.88+2);
}

// --- Spieler ---
function drawPlayer(){
  if(P.dead&&Math.floor(P.deathTimer*10)%2===0) return;
  const px=P.x|0, py=P.y|0;

  // Sprite auswählen: Walk-Animation wenn läuft, sonst Idle
  const isWalking = P.onGround && Math.abs(P.vx) > 10;
  const walkFrame = (Math.floor(Date.now()/120)%4)+1; // 4 Frames @ ~120ms
  const sprKey = isWalking ? 'player-walk-'+walkFrame : 'player-idle';
  const spr = SPRITES[sprKey] || SPRITES['player-idle'];

  if(spr){
    cx.save();
    // Spiegeln wenn links
    if(P.vx<0){ cx.translate(px+P.w,0); cx.scale(-1,1); }
    else       { cx.translate(px,0); }
    cx.drawImage(spr, 0, py, P.w, P.h+4);
    cx.restore();
    if(hitFlash>0.4){
      cx.save();
      cx.globalAlpha=0.5;cx.fillStyle=C.red;
      cx.fillRect(px,py,P.w,P.h+4);
      cx.restore();
    }
  } else {
    // Fallback Canvas
    const col=hitFlash>0.4?C.red:null;
    cx.fillStyle=col||C.purp; cx.fillRect(px+3,py,P.w-6,5);
    cx.fillStyle=col||C.skin; cx.fillRect(px+3,py+4,P.w-6,8);
    cx.fillStyle=col||C.red;  cx.fillRect(px+1,py+10,P.w-2,P.h-10);
    cx.fillStyle=C.yel;cx.font='bold 9px "Press Start 2P"';cx.textAlign='center';
    cx.fillText('5',px+P.w/2,py+P.h-2);
    const la=P.climbing||P.vx===0?0:Math.sin(P.frame*1.5)*3;
    cx.fillStyle=col||C.dbl;
    cx.fillRect(px+2,py+P.h,7,6+la);
    cx.fillRect(px+P.w-9,py+P.h,7,6-la);
  }
}

// v0.11.3 (CC-Review #6): drawBuilding() gelöscht — seit E-098 aufruferlos (Menü/Over/Win nutzen drawBuildingShape direkt)

function drawBuildingShape(bx,by,stage,W,H,ghost){
  // E-046: App-Reward — zeichnet die App-Stufe (Sprite). Ghost-Alpha setzt der Aufrufer.
  const s=Math.max(1,Math.min(stage|0,MAX_STAGE));
  const app=SPRITES['app-'+s];
  if(app){ cx.drawImage(app, bx, by, W, H); return; }
  // Fallback: prozedurales "Haus" (alt), falls Sprites nicht laden
  const col  = ghost?'rgba(74,159,212,0.5)' :C.yel;
  const wall = ghost?'rgba(74,159,212,0.4)' :'#4a9fd4';
  const base = ghost?'rgba(200,150,0,0.3)'  :C.yeld;
  // Fundament
  cx.fillStyle=base; cx.fillRect(bx+2,by+H-6,W-4,6);
  if(stage>=2){ cx.fillStyle=wall; cx.fillRect(bx+4,by+H-16,W-8,10); }
  if(stage>=3){ cx.fillStyle=wall; cx.fillRect(bx+4,by+H-24,W-8,8);
                cx.fillStyle=col;  cx.fillRect(bx+2,by+H-25,W-4,3); }
  if(stage>=4){ cx.fillStyle='rgba(160,220,255,0.8)';
                cx.fillRect(bx+5, by+H-22,5,5);
                cx.fillRect(bx+W-10,by+H-22,5,5); }
  if(stage>=5){ cx.fillStyle=col;  cx.fillRect(bx+W/2-1,by+2,2,H-25);
                cx.fillStyle=C.red;cx.fillRect(bx+W/2+1,by+2,6,4); }
}

// v0.5-bc (A1, E-061): App-Icon programmatisch (R-046 "Code wiederholt", 0 neue Assets)
function drawAppIcon(x,y,sz,idx){
  const hues=['#4a9fd4','#f5c400','#7ec850','#e06c9f','#e08a3c','#9b7ede'];
  cx.fillStyle='rgba(0,0,0,0.55)'; cx.fillRect(x-1,y-1,sz+2,sz+2);      // dunkler Rand = Kontrast gegen den Himmel
  cx.fillStyle=hues[idx%hues.length]; cx.fillRect(x,y,sz,sz);           // Kachel, Farb-Swap pro App
  cx.fillStyle='rgba(255,255,255,0.9)'; cx.fillRect(x+1,y+1,sz-2,2);    // Titelbalken -> liest sich als App-Fenster
  cx.fillStyle='rgba(255,255,255,0.45)'; cx.fillRect(x+1,y+sz-3,sz-3,1);
  // v0.9 (E-073/M5a): Ambient — Fenster blinkt versetzt pro App (KONZEPT §5 A-3)
  if(((Date.now()/400|0) + idx*3) % 7 < 2){ cx.fillStyle='rgba(255,255,200,0.9)'; cx.fillRect(x+2, y+4, 2, 2); }
}
// Skyline der ausgelieferten Apps — oben links im Himmel (ueber P4, weg vom Gorilla in der Mitte)
function drawAppSkyline(){
  const n=appsShipped;
  // v0.11.5 (E-100/Lena D-Nachtrag 3 #2): APPS-Label auf 8px angehoben (E-050-Floor), gleiche Optik wie featLine
  cx.textAlign='left'; cx.font='8px "Press Start 2P"';

  // v0.11.5 (E-100/Lena D1): Fortschritt rechtsbuendig in Zeile 2 (Projekt-Zeile) — ausgeschrieben, gleiche Gelb-/Schatten-Optik wie APPS-Label
  // v0.11.5 (E-100/Lena D-Nachtrag 3 #1): Anker auf SND_BOX.x-6 statt GW-6 — vermeidet Kollision mit dem Sound-Button (SND_BOX x374-396,y44-66)
  cx.textAlign='right'; cx.font='8px "Press Start 2P"';
  const featLine='FEATURES '+featsIntoApp+'/'+appFeatsNeeded()+' · '+ACT_GOAL[act]; // v0.11.6 (E-104/Milo): Zaehler = erledigt/gesamt, Start 0/1; Plural grenzt vom Banner-Singular ab
  cx.fillStyle='rgba(0,0,0,0.6)'; cx.fillText(featLine, SND_BOX.x-5, 49);     // Schatten
  cx.fillStyle=C.yel; cx.fillText(featLine, SND_BOX.x-6, 48);
  cx.textAlign='left'; cx.font='6px "Press Start 2P"';
  const sz=9, gap=2, maxIcons=10, x0=62, yb=50; // v0.11.5 (D-Nachtrag 3 #2): 54→62 — Platz fuer das breitere 8px-APPS-Label
  const show=Math.min(n,maxIcons);
  for(let i=0;i<show;i++){
    const pulse=(i===show-1 && appDoneTimer>0) ? Math.round(3*Math.min(1,appDoneTimer)) : 0;
    const s=sz+pulse;
    drawAppIcon(x0+i*(sz+gap), yb-s, s, i);                             // unten buendig, neueste pulst kurz
  }
  if(n>maxIcons){ cx.fillStyle=C.wht; cx.font='6px "Press Start 2P"'; cx.textAlign='left';
    cx.fillText('+'+(n-maxIcons), x0+show*(sz+gap)+2, 49); }
  if(appDoneTimer>0){                                                   // kurzer "APP FERTIG!"-Moment, neben der Skyline
    cx.globalAlpha=Math.min(1,appDoneTimer);
    cx.fillStyle=C.yel; cx.font='7px "Press Start 2P"'; cx.textAlign='left';
    cx.fillText('APP RELEASED!', 6, 66); // v0.11 (E-095): released trägt die Metapher
    cx.globalAlpha=1;
  }
}

// --- Win-Animation ---
function drawWin(){
  const age=1.8-winAnim;
  const alpha=Math.min(1,age*1.6);
  cx.fillStyle=`rgba(13,13,46,${alpha*0.92})`;cx.fillRect(0,0,GW,GH); // v0.11.5 (E-100/Lena D-Nachtrag #2): 0.85→0.92 — Welt (2. Gorillaman, Fass-Rand) konkurrierte mit der Feier-Figur
  if(alpha<0.3) return;
  // v0.11.5 (E-100/Lena D2): Win-Screen als EINE Karte statt drei Inseln — Leistung oben (groesstes Element)
  // → Wachstum direkt darunter → Vorschau als kompakter Fuss → Countdown fluestert ganz unten.
  // --- Sieg-Figur: der Businessman feiert mit (Gegner wird Kollege), 8-Frame-Jubel — raus aus der HUD-Zone (hy 2→40) ---
  { const hf=Math.min(7,Math.floor(age/0.12));
    const hh=86, hw=Math.round(hh*93/100), hx=GW/2-hw/2, hy=40;
    drawSheet('win-hero', hf, 8, hx, hy, hw, hh); }
  // --- Leistung (groesstes Text-Element des Screens, Lena-Hierarchieregel) ---
  cx.textAlign='center';
  const featureDoneNow=(act===2); // LIVE geschafft = Feature komplett
  cx.fillStyle=C.yel;cx.font='11px "Press Start 2P"';
  cx.fillText(featureDoneNow?('FEATURE '+(featsIntoApp+1)+' FERTIG! ★'):(ACT_GOAL[act]+' FERTIG! ★'),GW/2,142);
  cx.fillStyle=C.wht;cx.font='8px "Press Start 2P"';
  cx.fillText('+'+winBonus+' PUNKTE',GW/2,162);

  // Trennlinie
  cx.strokeStyle='rgba(74,159,212,0.5)';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(40,174);cx.lineTo(GW-40,174);cx.stroke();

  // --- Wachstum: App-Reward direkt unter der Leistung (E-099-Kopplung an die aktuelle App bleibt) ---
  const appStage = Math.min(MAX_STAGE, 1 + Math.round((MAX_STAGE-1) * (featsIntoApp + (featureDoneNow?1:0)) / Math.max(1,appFeatsNeeded())));
  const aw=104, ah=91, ax=GW/2-aw/2, ay=184;
  if(SPRITES['app-'+appStage]) cx.drawImage(SPRITES['app-'+appStage], ax, ay, aw, ah);
  else drawBuildingShape(ax, ay, appStage, aw, ah, false); // v0.4.1 (CC#7): Canvas-Fallback
  cx.fillStyle=C.blu;cx.font='8px "Press Start 2P"';cx.textAlign='center';
  cx.fillText('APP '+(appsShipped+1)+' · FEATURES '+(featsIntoApp+(featureDoneNow?1:0))+'/'+appFeatsNeeded(), GW/2, ay+ah+16); // v0.11.6 (E-104): featsIntoApp zaehlt erst in advance() hoch (nach diesem Screen) - Korrektur zeigt den grade verdienten Stand

  // --- Vorschau als kompakter Fuss (kleiner als die Leistung, Lena-Hierarchieregel) ---
  const nextAct=(act+1)%3;
  const appDoneNow=featureDoneNow && (featsIntoApp+1)>=appFeatsNeeded();
  const footY=ay+ah+34;
  cx.fillStyle=C.blu;cx.font='7px "Press Start 2P"';
  cx.fillText(appDoneNow?'APP RELEASED — NEUE APP:':(featureDoneNow?'NÄCHSTES FEATURE:':'NÄCHSTE STUFE:'),GW/2,footY);
  cx.fillStyle=C.yel;cx.font='8px "Press Start 2P"';
  cx.fillText(appDoneNow?'FEATURE 1':(featureDoneNow?'FEATURE '+(featsIntoApp+2):ACT_GOAL[nextAct]),GW/2,footY+16);

  // Neue Barrel-Vorschau — Schreibweise wie im Startschirm (Letter davor · Fass · voller Name · Punkte), kompakt
  const newTypes = ACT_NEW[nextAct];
  cx.fillStyle='rgba(255,255,255,0.5)';cx.font='7px "Press Start 2P"';
  cx.fillText(nextAct===0?'Fässer:':'Neu dabei:', GW/2, footY+30);
  newTypes.forEach((k,i)=>{
    const t=BARREL_TYPES[k]; const ry=footY+40+i*20;
    drawBarrelBig(k,GW/2-80,ry,30,15); // v0.11.6 (E-104): Buchstabe zentriert mitskaliert
    cx.fillStyle=t.color;cx.font='7px "Press Start 2P"';cx.textAlign='left';
    cx.fillText(NAME_FULL[k]||t.label,GW/2-38,ry+11);
    cx.fillStyle='rgba(255,255,255,0.5)';cx.textAlign='right';
    cx.fillText(t.pts+'pt',GW/2+80,ry+11);
    cx.textAlign='center';
  });
  cx.textAlign='center';

  // --- Countdown fluestert: duenn, ganz unten, gedaempfte Farbe (kein sattes Vollgelb mehr) ---
  const prog = winAnim/1.8;
  cx.fillStyle='rgba(255,255,255,0.12)';cx.fillRect(80,540,GW-160,3);
  cx.fillStyle='rgba(245,196,0,0.45)';cx.fillRect(80,540,Math.round((GW-160)*(1-prog)),3);
}

// --- Loop ---
let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,0.05); lastT=ts;
  if(state==='play'){
    if(buildTutTimer>0){ // v0.11.3 (CC-Review #1): Popup hält die WELT an — kein Spawn, keine Kollision, kein Tod hinterm Overlay
      if(!DEV_BUILD) buildTutTimer-=dt;
    } else {
    updatePlayer(dt);
    updateBarrels(dt);
    // v0.4.1 (CC#5): Render-Timer dt-basiert (120-Hz-stabil)
    if(hitFlash>0) hitFlash=Math.max(0,hitFlash-dt*3.6);
    if(shake>0) shake=Math.max(0,shake-dt); // v0.10 (E-067)
    kongWobble+=dt*0.18;
    if(kongThrowT>0) kongThrowT=Math.max(0,kongThrowT-dt);
    for(const f of floaters){f.life-=dt;f.y-=38*dt;}
    floaters=floaters.filter(f=>f.life>0);
    } // Ende Welt-Freeze (v0.11.3, CC-Review #1); DEV-Klick-Verhalten (E-098) unverändert — Timer läuft im Freeze-Zweig
    if(appDoneTimer>0) appDoneTimer-=dt; // v0.5-bc (A1): "APP FERTIG"-Moment ausblenden
  }
  if(state==='winanim'){
    if(DEV_BUILD){ winAnim=Math.max(0.02,winAnim-dt); } // v0.11.2 (Holger): DEV — Win-Screen bleibt bis Klick/Taste stehen
    else { winAnim-=dt; if(winAnim<=0) nextAct(); }
  }
  render();
  requestAnimationFrame(loop);
}

// --- Start ---
function startOrRestart(){
  if(state==='menu'){ initGame(); sfx('start'); }
  else if(state==='over'){ level=1; lives=3; initGame(); sfx('start'); }
}
window.addEventListener('keydown',e=>{
  if(e.code==='KeyM'){ toggleSound(); return; } // v0.10 (E-067): Mute-Toggle Desktop
  if(e.code==='KeyB'){ barrelLetters=!barrelLetters; return; } // v0.10.3 (E-088): Fass-Letter an/aus
  if(state==='play'&&buildTutTimer>0&&(e.code==='Space'||e.code==='Enter')){ buildTutTimer=0; spawnFreeze=Math.min(spawnFreeze,0.8); return; } // v0.11.1: Popup auch per Taste schließbar
  if(state==='winanim'&&DEV_BUILD&&(e.code==='Space'||e.code==='Enter')){ nextAct(); return; } // v0.11.2: DEV — Win-Screen per Taste weiter
  if(e.code==='Space'||e.code==='Enter') startOrRestart();
});
cv.addEventListener('pointerdown',e=>{ // v0.10 (E-067): erst Sound-Button-Hit-Test (±8px Touch-Puffer), dann Start
  const r=cv.getBoundingClientRect();
  const gx=(e.clientX-r.left)/r.width*GW, gy=(e.clientY-r.top)/r.height*GH;
  if(gx>=SND_BOX.x-8&&gx<=SND_BOX.x+SND_BOX.w+8&&gy>=SND_BOX.y-8&&gy<=SND_BOX.y+SND_BOX.h+8){ toggleSound(); return; }
  if(state==='play'&&buildTutTimer>0){ buildTutTimer=0; spawnFreeze=Math.min(spawnFreeze,0.8); return; } // v0.11.1: Popup per Tipp schließbar (Holger), kurzer Rest-Freeze fürs Banner
  if(state==='winanim'&&DEV_BUILD){ nextAct(); return; } // v0.11.2: DEV — Win-Screen per Tipp weiter
  startOrRestart();
});
// v0.4.1 (CC#2): JUMP-Button startet/neustartet auch per Touch
document.getElementById('bJ').addEventListener('pointerdown',()=>{ if(state!=='play') startOrRestart(); });

requestAnimationFrame(loop);
</script>
